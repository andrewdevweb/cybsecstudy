<svg viewBox="0 0 1020 510" xmlns="http://www.w3.org/2000/svg" font-family="'JetBrains Mono', monospace">
  <rect width="1020" height="510" fill="#0a0a0f"/>
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(0,255,159,0.03)" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="1020" height="510" fill="url(#grid)"/>

  <!-- TITLE -->
  <text x="48" y="62" fill="#1a1a2a" font-size="52" font-weight="700">CLOUD COMPUTING</text>
  <text x="46" y="60" fill="#e8eaf0" font-size="52" font-weight="700">CLOUD COMPUTING</text>
  <text x="48" y="82" fill="#00ff9f" font-size="10" letter-spacing="4">FUNDAMENTOS DE LA COMPUTACIÓN EN LA NUBE</text>
  <line x1="48" y1="92" x2="500" y2="92" stroke="#1e1e2e" stroke-width="1"/>

  <!-- LEFT: service models -->
  <text x="48" y="112" fill="#6b6b8a" font-size="9" letter-spacing="2">// MODELOS DE SERVICIO</text>

  <!-- IaaS -->
  <rect x="48" y="122" width="126" height="90" rx="3" fill="#12121a" stroke="#4d96ff" stroke-width="1.5"/>
  <rect x="48" y="122" width="126" height="4" fill="#4d96ff"/>
  <text x="111" y="146" text-anchor="middle" fill="#4d96ff" font-size="13" font-weight="700">IaaS</text>
  <text x="111" y="162" text-anchor="middle" fill="#6b6b8a" font-size="9">Infraestructura</text>
  <text x="111" y="175" text-anchor="middle" fill="#6b6b8a" font-size="8">como Servicio</text>
  <text x="111" y="190" text-anchor="middle" fill="#3a3a5a" font-size="8">EC2 · VMs · red</text>
  <text x="111" y="224" text-anchor="middle" fill="#4d96ff" font-size="9">piso vacío</text>

  <!-- PaaS -->
  <rect x="184" y="122" width="126" height="90" rx="3" fill="#12121a" stroke="#ff9f43" stroke-width="1.5"/>
  <rect x="184" y="122" width="126" height="4" fill="#ff9f43"/>
  <text x="247" y="146" text-anchor="middle" fill="#ff9f43" font-size="13" font-weight="700">PaaS</text>
  <text x="247" y="162" text-anchor="middle" fill="#6b6b8a" font-size="9">Plataforma</text>
  <text x="247" y="175" text-anchor="middle" fill="#6b6b8a" font-size="8">como Servicio</text>
  <text x="247" y="190" text-anchor="middle" fill="#3a3a5a" font-size="8">Heroku · App Engine</text>
  <text x="247" y="224" text-anchor="middle" fill="#ff9f43" font-size="9">piso amueblado</text>

  <!-- SaaS -->
  <rect x="320" y="122" width="126" height="90" rx="3" fill="#12121a" stroke="#00ff9f" stroke-width="1.5"/>
  <rect x="320" y="122" width="126" height="4" fill="#00ff9f"/>
  <text x="383" y="146" text-anchor="middle" fill="#00ff9f" font-size="13" font-weight="700">SaaS</text>
  <text x="383" y="162" text-anchor="middle" fill="#6b6b8a" font-size="9">Software</text>
  <text x="383" y="175" text-anchor="middle" fill="#6b6b8a" font-size="8">como Servicio</text>
  <text x="383" y="190" text-anchor="middle" fill="#3a3a5a" font-size="8">Gmail · Zoom · Slack</text>
  <text x="383" y="224" text-anchor="middle" fill="#00ff9f" font-size="9">hotel</text>

  <!-- cloud types -->
  <text x="48" y="250" fill="#6b6b8a" font-size="9" letter-spacing="2">// TIPOS DE NUBE</text>
  <rect x="48"  y="260" width="120" height="44" rx="2" fill="#12121a" stroke="#4d96ff" stroke-width="1"/>
  <text x="108" y="278" text-anchor="middle" fill="#4d96ff" font-size="10" font-weight="700">PÚBLICA</text>
  <text x="108" y="294" text-anchor="middle" fill="#6b6b8a" font-size="8">AWS · Azure · GCP</text>

  <rect x="176" y="260" width="120" height="44" rx="2" fill="#12121a" stroke="#c77dff" stroke-width="1"/>
  <text x="236" y="278" text-anchor="middle" fill="#c77dff" font-size="10" font-weight="700">PRIVADA</text>
  <text x="236" y="294" text-anchor="middle" fill="#6b6b8a" font-size="8">bancos · gobierno</text>

  <rect x="304" y="260" width="142" height="44" rx="2" fill="#12121a" stroke="#ffd93d" stroke-width="1"/>
  <text x="375" y="278" text-anchor="middle" fill="#ffd93d" font-size="10" font-weight="700">HÍBRIDA</text>
  <text x="375" y="294" text-anchor="middle" fill="#6b6b8a" font-size="8">privada + pública</text>

  <!-- providers -->
  <text x="48" y="330" fill="#6b6b8a" font-size="9" letter-spacing="2">// PROVEEDORES</text>
  <rect x="48" y="340" width="398" height="52" rx="2" fill="#12121a" stroke="#1e1e2e" stroke-width="1"/>
  <text x="64"  y="360" fill="#ff9f43" font-size="10" font-weight="700">AWS</text>
  <text x="64"  y="376" fill="#3a3a5a" font-size="8">~32%</text>
  <text x="120" y="360" fill="#4d96ff" font-size="10" font-weight="700">Azure</text>
  <text x="120" y="376" fill="#3a3a5a" font-size="8">~23%</text>
  <text x="190" y="360" fill="#6bcb77" font-size="10" font-weight="700">GCP</text>
  <text x="190" y="376" fill="#3a3a5a" font-size="8">~12%</text>
  <text x="248" y="360" fill="#c77dff" font-size="10" font-weight="700">Alibaba</text>
  <text x="248" y="376" fill="#3a3a5a" font-size="8">~4%</text>
  <text x="330" y="360" fill="#ffd93d" font-size="10" font-weight="700">IBM · Oracle</text>
  <text x="330" y="376" fill="#3a3a5a" font-size="8">empresarial</text>

  <!-- security note -->
  <rect x="48" y="412" width="398" height="52" rx="2" fill="#12121a" stroke="#ff6b6b" stroke-width="1"/>
  <rect x="48" y="412" width="4" height="52" fill="#ff6b6b"/>
  <text x="62" y="430" fill="#ff6b6b" font-size="10" font-weight="700">Responsabilidad Compartida</text>
  <text x="62" y="446" fill="#6b6b8a" font-size="9">Proveedor → seguridad DE la nube</text>
  <text x="62" y="458" fill="#6b6b8a" font-size="9">Cliente → seguridad EN la nube (config, IAM, datos)</text>

  <!-- benefits bottom -->
  <text x="48" y="490" fill="#3a3a5a" font-size="8">escalabilidad · pago por uso · alta disponibilidad · acceso global · autoservicio inmediato</text>

  <!-- RIGHT divider -->
  <line x1="470" y1="30" x2="470" y2="490" stroke="#1e1e2e" stroke-width="1"/>

  <!-- RIGHT: timeline evolution -->
  <text x="496" y="48" fill="#6b6b8a" font-size="9" letter-spacing="2">// EVOLUCIÓN HACIA LA NUBE</text>

  <!-- timeline line -->
  <line x1="520" y1="70" x2="520" y2="460" stroke="#1e1e2e" stroke-width="1.5"/>

  <!-- era 1 -->
  <circle cx="520" cy="88" r="5" fill="#6b6b8a"/>
  <rect x="536" y="70" width="460" height="52" rx="2" fill="#12121a" stroke="#1e1e2e" stroke-width="1"/>
  <text x="550" y="90" fill="#6b6b8a" font-size="10" font-weight="700">Servidores Físicos</text>
  <text x="550" y="105" fill="#3a3a5a" font-size="9">1960s–2000s · un servidor = una app · caro e ineficiente</text>
  <text x="950" y="90" text-anchor="end" fill="#3a3a5a" font-size="8">Era física</text>

  <!-- era 2 -->
  <circle cx="520" cy="162" r="5" fill="#4d96ff"/>
  <rect x="536" y="144" width="460" height="52" rx="2" fill="#12121a" stroke="#4d96ff" stroke-width="1"/>
  <text x="550" y="164" fill="#4d96ff" font-size="10" font-weight="700">Virtualización</text>
  <text x="550" y="179" fill="#3a3a5a" font-size="9">1999–2006 · múltiples VMs por servidor · mejor utilización</text>
  <text x="950" y="164" text-anchor="end" fill="#3a3a5a" font-size="8">VMware, Xen</text>

  <!-- era 3 -->
  <circle cx="520" cy="236" r="5" fill="#ff9f43"/>
  <rect x="536" y="218" width="460" height="52" rx="2" fill="#12121a" stroke="#ff9f43" stroke-width="1"/>
  <text x="550" y="238" fill="#ff9f43" font-size="10" font-weight="700">Automatización Remota</text>
  <text x="550" y="253" fill="#3a3a5a" font-size="9">2003–2006 · gestión por internet · infra más flexible</text>
  <text x="950" y="238" text-anchor="end" fill="#3a3a5a" font-size="8">Precursores</text>

  <!-- era 4 -->
  <circle cx="520" cy="310" r="5" fill="#00ff9f"/>
  <rect x="536" y="292" width="460" height="52" rx="2" fill="#12121a" stroke="#00ff9f" stroke-width="1"/>
  <text x="550" y="312" fill="#00ff9f" font-size="10" font-weight="700">Cloud Computing — AWS Launch</text>
  <text x="550" y="327" fill="#3a3a5a" font-size="9">2006 · alquiler de recursos bajo demanda · sin hardware propio</text>
  <text x="950" y="312" text-anchor="end" fill="#3a3a5a" font-size="8">Revolución</text>

  <!-- era 5 -->
  <circle cx="520" cy="384" r="5" fill="#c77dff"/>
  <rect x="536" y="366" width="460" height="52" rx="2" fill="#12121a" stroke="#c77dff" stroke-width="1"/>
  <text x="550" y="386" fill="#c77dff" font-size="10" font-weight="700">Era Moderna</text>
  <text x="550" y="401" fill="#3a3a5a" font-size="9">2012–hoy · contenedores · serverless · IA integrada · escala global</text>
  <text x="950" y="386" text-anchor="end" fill="#3a3a5a" font-size="8">AWS · Azure · GCP</text>

  <!-- connector lines -->
  <line x1="520" y1="93" x2="520" y2="157" stroke="#1e1e2e" stroke-width="1"/>
  <line x1="520" y1="167" x2="520" y2="231" stroke="#1e1e2e" stroke-width="1"/>
  <line x1="520" y1="241" x2="520" y2="305" stroke="#1e1e2e" stroke-width="1"/>
  <line x1="520" y1="315" x2="520" y2="379" stroke="#1e1e2e" stroke-width="1"/>

  <!-- bottom quote -->
  <rect x="536" y="434" width="460" height="44" rx="2" fill="#12121a" stroke="#00ff9f" stroke-width="1"/>
  <rect x="536" y="434" width="4" height="44" fill="#00ff9f"/>
  <text x="550" y="452" fill="#e8eaf0" font-size="10" font-style="italic">"La nube no es el futuro — es el presente.</text>
  <text x="550" y="468" fill="#e8eaf0" font-size="10" font-style="italic">El 90% del internet moderno corre en infraestructura cloud."</text>
</svg>
