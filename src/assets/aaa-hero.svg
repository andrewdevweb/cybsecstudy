<svg viewBox="0 0 1020 510" xmlns="http://www.w3.org/2000/svg" font-family="'JetBrains Mono', monospace">
  <rect width="1020" height="510" fill="#0a0a0f"/>
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(255,107,107,0.05)" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="1020" height="510" fill="url(#grid)"/>

  <text x="48" y="48" fill="#e8eaf0" font-size="42" font-weight="700">AAA Y CONTROL DE ACCESO</text>
  <text x="48" y="68" fill="#ff6b6b" font-size="10" letter-spacing="3">AUTENTICACION · AUTORIZACION · ACCOUNTING</text>
  <line x1="48" y1="80" x2="620" y2="80" stroke="#1e1e2e" stroke-width="1"/>

  <rect x="48" y="112" width="280" height="250" rx="4" fill="#12121a" stroke="#ff6b6b" stroke-width="1.5"/>
  <rect x="48" y="112" width="280" height="5" fill="#ff6b6b"/>
  <text x="188" y="142" text-anchor="middle" fill="#ff6b6b" font-size="18" font-weight="700">AUTHN</text>
  <text x="188" y="170" text-anchor="middle" fill="#ff6b6b" font-size="12" font-weight="700">AUTENTICACION</text>
  <text x="188" y="196" text-anchor="middle" fill="#6b6b8a" font-size="9">demostrar identidad</text>
  <text x="70" y="234" fill="#6b6b8a" font-size="9">• password y MFA</text>
  <text x="70" y="252" fill="#6b6b8a" font-size="9">• certificados y llaves</text>
  <text x="70" y="270" fill="#6b6b8a" font-size="9">• SSO y passkeys</text>
  <text x="70" y="288" fill="#6b6b8a" font-size="9">• validacion de identidad</text>
  <text x="70" y="326" fill="#3a3a5a" font-size="8">riesgo tipico: credenciales robadas o MFA ausente</text>

  <rect x="370" y="112" width="280" height="250" rx="4" fill="#12121a" stroke="#4d96ff" stroke-width="1.5"/>
  <rect x="370" y="112" width="280" height="5" fill="#4d96ff"/>
  <text x="510" y="142" text-anchor="middle" fill="#4d96ff" font-size="18" font-weight="700">AUTHZ</text>
  <text x="510" y="170" text-anchor="middle" fill="#4d96ff" font-size="12" font-weight="700">AUTORIZACION</text>
  <text x="510" y="196" text-anchor="middle" fill="#6b6b8a" font-size="9">decidir permisos y alcance</text>
  <text x="392" y="234" fill="#6b6b8a" font-size="9">• roles y grupos</text>
  <text x="392" y="252" fill="#6b6b8a" font-size="9">• ACL, RBAC, ABAC</text>
  <text x="392" y="270" fill="#6b6b8a" font-size="9">• minimo privilegio</text>
  <text x="392" y="288" fill="#6b6b8a" font-size="9">• negacion por defecto</text>
  <text x="392" y="326" fill="#3a3a5a" font-size="8">riesgo tipico: exceso de privilegios</text>

  <rect x="692" y="112" width="280" height="250" rx="4" fill="#12121a" stroke="#6bcb77" stroke-width="1.5"/>
  <rect x="692" y="112" width="280" height="5" fill="#6bcb77"/>
  <text x="832" y="142" text-anchor="middle" fill="#6bcb77" font-size="18" font-weight="700">ACC</text>
  <text x="832" y="170" text-anchor="middle" fill="#6bcb77" font-size="12" font-weight="700">ACCOUNTING</text>
  <text x="832" y="196" text-anchor="middle" fill="#6b6b8a" font-size="9">saber que paso y cuando</text>
  <text x="714" y="234" fill="#6b6b8a" font-size="9">• logs de acceso</text>
  <text x="714" y="252" fill="#6b6b8a" font-size="9">• cambios de permisos</text>
  <text x="714" y="270" fill="#6b6b8a" font-size="9">• uso de tokens</text>
  <text x="714" y="288" fill="#6b6b8a" font-size="9">• auditoria y trazabilidad</text>
  <text x="714" y="326" fill="#3a3a5a" font-size="8">riesgo tipico: no poder investigar ni atribuir acciones</text>

  <text x="48" y="440" fill="#6b6b8a" font-size="9" letter-spacing="2">// QUIEN ERES · QUE PUEDES HACER · QUE QUEDA REGISTRADO</text>
</svg>
