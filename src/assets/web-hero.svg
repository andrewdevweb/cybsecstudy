<svg viewBox="0 0 1020 510" xmlns="http://www.w3.org/2000/svg" font-family="'JetBrains Mono', monospace">
  <rect width="1020" height="510" fill="#0a0a0f"/>
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(0,255,159,0.03)" stroke-width="1"/>
    </pattern>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="rgba(0,255,159,0.05)"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0)"/>
    </radialGradient>
  </defs>
  <rect width="1020" height="510" fill="url(#grid)"/>
  <rect width="1020" height="510" fill="url(#glow)"/>

  <!-- TITLE top left -->
  <text x="48" y="68" fill="#1a1a2a" font-size="80" font-weight="700">WEB</text>
  <text x="46" y="66" fill="#e8eaf0" font-size="80" font-weight="700">WEB</text>
  <text x="48" y="88" fill="#00ff9f" font-size="10" letter-spacing="4">CÓMO FUNCIONAN LOS SITIOS WEB</text>
  <line x1="48" y1="98" x2="340" y2="98" stroke="#1e1e2e" stroke-width="1"/>

  <!-- LEFT: browser → internet → server flow -->
  <text x="48" y="120" fill="#6b6b8a" font-size="9" letter-spacing="2">// FLUJO DE SOLICITUD</text>

  <!-- Browser box -->
  <rect x="48" y="130" width="100" height="70" rx="2" fill="#12121a" stroke="#00ff9f" stroke-width="1"/>
  <rect x="55" y="138" width="86" height="54" rx="1" fill="#0a0a0f" stroke="#1e1e2e" stroke-width="1"/>
  <rect x="55" y="138" width="86" height="12" rx="1 1 0 0" fill="#1e1e2e"/>
  <circle cx="61" cy="144" r="2" fill="#ff6b6b"/>
  <circle cx="68" cy="144" r="2" fill="#ffd93d"/>
  <circle cx="75" cy="144" r="2" fill="#6bcb77"/>
  <rect x="60" y="155" width="76" height="6" rx="1" fill="#1e1e2e"/>
  <rect x="60" y="165" width="50" height="4" rx="1" fill="#00ff9f" opacity="0.3"/>
  <rect x="60" y="173" width="66" height="4" rx="1" fill="#1e1e2e"/>
  <text x="98" y="212" text-anchor="middle" fill="#00ff9f" font-size="9">BROWSER</text>

  <!-- arrow right -->
  <line x1="152" y1="160" x2="192" y2="160" stroke="#00ff9f" stroke-width="1.5" marker-end="url(#ga)"/>
  <text x="172" y="153" text-anchor="middle" fill="#00ff9f" font-size="7">request</text>
  <line x1="192" y1="172" x2="152" y2="172" stroke="#4d96ff" stroke-width="1.5" marker-end="url(#ba)"/>
  <text x="172" y="185" text-anchor="middle" fill="#4d96ff" font-size="7">response</text>

  <!-- Internet cloud -->
  <rect x="192" y="130" width="90" height="70" rx="2" fill="#12121a" stroke="#4d96ff" stroke-width="1"/>
  <ellipse cx="237" cy="168" rx="28" ry="18" fill="none" stroke="#4d96ff" stroke-width="1" opacity="0.5"/>
  <ellipse cx="237" cy="168" rx="10" ry="18" fill="none" stroke="#4d96ff" stroke-width="1" opacity="0.3"/>
  <line x1="209" y1="168" x2="265" y2="168" stroke="#4d96ff" stroke-width="1" opacity="0.3"/>
  <text x="237" y="213" text-anchor="middle" fill="#4d96ff" font-size="9">INTERNET</text>

  <!-- arrow right -->
  <line x1="286" y1="160" x2="326" y2="160" stroke="#00ff9f" stroke-width="1.5" marker-end="url(#ga)"/>
  <text x="306" y="153" text-anchor="middle" fill="#00ff9f" font-size="7">request</text>
  <line x1="326" y1="172" x2="286" y2="172" stroke="#4d96ff" stroke-width="1.5" marker-end="url(#ba)"/>
  <text x="306" y="185" text-anchor="middle" fill="#4d96ff" font-size="7">response</text>

  <!-- Server box -->
  <rect x="326" y="130" width="90" height="70" rx="2" fill="#12121a" stroke="#ff9f43" stroke-width="1"/>
  <rect x="344" y="140" width="54" height="48" rx="1" fill="#0a0a0f" stroke="#ff9f43" stroke-width="1"/>
  <rect x="347" y="143" width="48" height="9" rx="1" fill="#ff9f43" opacity="0.2"/>
  <circle cx="389" cy="147" r="2" fill="#ff9f43"/>
  <rect x="347" y="156" width="48" height="9" rx="1" fill="#ff9f43" opacity="0.15"/>
  <circle cx="389" cy="160" r="2" fill="#ff9f43" opacity="0.6"/>
  <rect x="347" y="169" width="48" height="9" rx="1" fill="#ff9f43" opacity="0.1"/>
  <text x="371" y="213" text-anchor="middle" fill="#ff9f43" font-size="9">SERVER</text>

  <!-- MIDDLE: 3 pillars -->
  <text x="48" y="248" fill="#6b6b8a" font-size="9" letter-spacing="2">// LOS 3 PILARES</text>

  <rect x="48"  y="258" width="120" height="60" rx="1" fill="#12121a" stroke="#ff6b9d" stroke-width="1"/>
  <rect x="48"  y="258" width="120" height="3" fill="#ff6b9d"/>
  <text x="108" y="282" text-anchor="middle" fill="#ff6b9d" font-size="14" font-weight="700">HTML</text>
  <text x="108" y="298" text-anchor="middle" fill="#6b6b8a" font-size="9">estructura</text>
  <text x="108" y="310" text-anchor="middle" fill="#6b6b8a" font-size="9">y contenido</text>

  <rect x="176" y="258" width="120" height="60" rx="1" fill="#12121a" stroke="#4d96ff" stroke-width="1"/>
  <rect x="176" y="258" width="120" height="3" fill="#4d96ff"/>
  <text x="236" y="282" text-anchor="middle" fill="#4d96ff" font-size="14" font-weight="700">CSS</text>
  <text x="236" y="298" text-anchor="middle" fill="#6b6b8a" font-size="9">estilo visual</text>
  <text x="236" y="310" text-anchor="middle" fill="#6b6b8a" font-size="9">y diseño</text>

  <rect x="304" y="258" width="120" height="60" rx="1" fill="#12121a" stroke="#ffd93d" stroke-width="1"/>
  <rect x="304" y="258" width="120" height="3" fill="#ffd93d"/>
  <text x="364" y="282" text-anchor="middle" fill="#ffd93d" font-size="14" font-weight="700">JS</text>
  <text x="364" y="298" text-anchor="middle" fill="#6b6b8a" font-size="9">interactividad</text>
  <text x="364" y="310" text-anchor="middle" fill="#6b6b8a" font-size="9">y lógica</text>

  <!-- BOTTOM LEFT: security -->
  <text x="48" y="348" fill="#6b6b8a" font-size="9" letter-spacing="2">// SEGURIDAD</text>
  <rect x="48"  y="358" width="185" height="52" rx="1" fill="#12121a" stroke="#ff6b6b" stroke-width="1"/>
  <rect x="48"  y="358" width="4" height="52" fill="#ff6b6b"/>
  <text x="64" y="378" fill="#ff6b6b" font-size="11" font-weight="700">Exposición de Datos</text>
  <text x="64" y="394" fill="#6b6b8a" font-size="9">credenciales en código fuente</text>
  <text x="64" y="406" fill="#6b6b8a" font-size="9">rutas ocultas · comentarios</text>

  <rect x="244" y="358" width="185" height="52" rx="1" fill="#12121a" stroke="#ff9f43" stroke-width="1"/>
  <rect x="244" y="358" width="4" height="52" fill="#ff9f43"/>
  <text x="260" y="378" fill="#ff9f43" font-size="11" font-weight="700">HTML Injection</text>
  <text x="260" y="394" fill="#6b6b8a" font-size="9">input sin sanitizar en el DOM</text>
  <text x="260" y="406" fill="#6b6b8a" font-size="9">escalada a XSS · phishing</text>

  <!-- RIGHT: HTML snippet + JS snippet -->
  <line x1="480" y1="40" x2="480" y2="470" stroke="#1e1e2e" stroke-width="1"/>

  <text x="510" y="62" fill="#6b6b8a" font-size="9" letter-spacing="2">// ESTRUCTURA HTML</text>
  <rect x="510" y="72" width="490" height="148" rx="1" fill="#12121a" stroke="#1e1e2e" stroke-width="1"/>
  <rect x="510" y="72" width="3" height="148" fill="#ff6b9d"/>
  <text x="524" y="92"  fill="#6b6b8a" font-size="10">&lt;!DOCTYPE html&gt;</text>
  <text x="524" y="108" fill="#ff6b9d" font-size="10">&lt;html&gt;</text>
  <text x="540" y="124" fill="#ff6b9d" font-size="10">&lt;head&gt;</text>
  <text x="556" y="140" fill="#6b6b8a" font-size="10">&lt;title&gt;<tspan fill="#b0b0c8">Mi Página</tspan>&lt;/title&gt;</text>
  <text x="540" y="156" fill="#ff6b9d" font-size="10">&lt;/head&gt;</text>
  <text x="540" y="172" fill="#ff6b9d" font-size="10">&lt;body&gt;</text>
  <text x="556" y="188" fill="#4d96ff" font-size="10">&lt;h1&gt;<tspan fill="#b0b0c8">Título</tspan>&lt;/h1&gt;</text>
  <text x="556" y="204" fill="#4d96ff" font-size="10">&lt;p id=<tspan fill="#6bcb77">"demo"</tspan>&gt;<tspan fill="#b0b0c8">Párrafo</tspan>&lt;/p&gt;</text>

  <text x="510" y="244" fill="#6b6b8a" font-size="9" letter-spacing="2">// JAVASCRIPT — EVENTOS Y DOM</text>
  <rect x="510" y="254" width="490" height="110" rx="1" fill="#12121a" stroke="#1e1e2e" stroke-width="1"/>
  <rect x="510" y="254" width="3" height="110" fill="#ffd93d"/>
  <text x="524" y="274" fill="#ffd93d" font-size="10">&lt;script&gt;</text>
  <text x="540" y="290" fill="#4d96ff" font-size="10">function <tspan fill="#00ff9f">sayHi</tspan>() {'{'}</text>
  <text x="556" y="306" fill="#6b6b8a" font-size="10">const name = document.<tspan fill="#00ff9f">getElementById</tspan>(<tspan fill="#6bcb77">'name'</tspan>).value;</text>
  <text x="556" y="322" fill="#6b6b8a" font-size="10">document.<tspan fill="#00ff9f">getElementById</tspan>(<tspan fill="#6bcb77">"demo"</tspan>).innerHTML = <tspan fill="#ff6b9d">"Hi " </tspan>+ name;</text>
  <text x="540" y="338" fill="#4d96ff" font-size="10">{'}'}</text>
  <text x="524" y="354" fill="#ffd93d" font-size="10">&lt;/script&gt;</text>

  <text x="510" y="390" fill="#6b6b8a" font-size="9" letter-spacing="2">// HTML INJECTION — EJEMPLO</text>
  <rect x="510" y="400" width="490" height="60" rx="1" fill="#12121a" stroke="#ff6b6b" stroke-width="1"/>
  <rect x="510" y="400" width="3" height="60" fill="#ff6b6b"/>
  <text x="524" y="420" fill="#6b6b8a" font-size="10">&lt;!-- Input sin sanitizar --&gt;</text>
  <text x="524" y="436" fill="#ff6b6b" font-size="10">innerHTML = <tspan fill="#ffd93d">"Welcome " </tspan>+ userInput<tspan fill="#6b6b8a">  ← VULNERABLE</tspan></text>
  <text x="524" y="452" fill="#00ff9f" font-size="10">textContent = <tspan fill="#ffd93d">"Welcome " </tspan>+ userInput<tspan fill="#6b6b8a">  ← SEGURO</tspan></text>

  <defs>
    <marker id="ga" markerWidth="7" markerHeight="7" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L7,3 z" fill="#00ff9f"/>
    </marker>
    <marker id="ba" markerWidth="7" markerHeight="7" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L7,3 z" fill="#4d96ff"/>
    </marker>
  </defs>
</svg>
