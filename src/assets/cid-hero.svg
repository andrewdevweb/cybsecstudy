<svg viewBox="0 0 1020 510" xmlns="http://www.w3.org/2000/svg" font-family="'JetBrains Mono', monospace">
  <rect width="1020" height="510" fill="#0a0a0f"/>
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(255,107,107,0.05)" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="1020" height="510" fill="url(#grid)"/>

  <text x="48" y="48" fill="#e8eaf0" font-size="42" font-weight="700">TRIADA CID</text>
  <text x="48" y="68" fill="#ff6b6b" font-size="10" letter-spacing="3">CONFIDENCIALIDAD · INTEGRIDAD · DISPONIBILIDAD</text>
  <line x1="48" y1="80" x2="500" y2="80" stroke="#1e1e2e" stroke-width="1"/>

  <rect x="48" y="112" width="280" height="250" rx="4" fill="#12121a" stroke="#ff6b6b" stroke-width="1.5"/>
  <rect x="48" y="112" width="280" height="5" fill="#ff6b6b"/>
  <text x="188" y="142" text-anchor="middle" fill="#ff6b6b" font-size="18" font-weight="700">C</text>
  <text x="188" y="170" text-anchor="middle" fill="#ff6b6b" font-size="12" font-weight="700">CONFIDENCIALIDAD</text>
  <text x="188" y="196" text-anchor="middle" fill="#6b6b8a" font-size="9">quien puede ver los datos</text>
  <text x="70" y="234" fill="#6b6b8a" font-size="9">• cifrado</text>
  <text x="70" y="252" fill="#6b6b8a" font-size="9">• control de acceso</text>
  <text x="70" y="270" fill="#6b6b8a" font-size="9">• MFA</text>
  <text x="70" y="288" fill="#6b6b8a" font-size="9">• minimo privilegio</text>
  <text x="70" y="326" fill="#3a3a5a" font-size="8">riesgo tipico: fuga, espionaje, exfiltracion</text>

  <rect x="370" y="112" width="280" height="250" rx="4" fill="#12121a" stroke="#4d96ff" stroke-width="1.5"/>
  <rect x="370" y="112" width="280" height="5" fill="#4d96ff"/>
  <text x="510" y="142" text-anchor="middle" fill="#4d96ff" font-size="18" font-weight="700">I</text>
  <text x="510" y="170" text-anchor="middle" fill="#4d96ff" font-size="12" font-weight="700">INTEGRIDAD</text>
  <text x="510" y="196" text-anchor="middle" fill="#6b6b8a" font-size="9">que el dato siga siendo fiable</text>
  <text x="392" y="234" fill="#6b6b8a" font-size="9">• hashes</text>
  <text x="392" y="252" fill="#6b6b8a" font-size="9">• firmas digitales</text>
  <text x="392" y="270" fill="#6b6b8a" font-size="9">• control de cambios</text>
  <text x="392" y="288" fill="#6b6b8a" font-size="9">• auditoria</text>
  <text x="392" y="326" fill="#3a3a5a" font-size="8">riesgo tipico: manipulacion, corrupcion, alteracion</text>

  <rect x="692" y="112" width="280" height="250" rx="4" fill="#12121a" stroke="#6bcb77" stroke-width="1.5"/>
  <rect x="692" y="112" width="280" height="5" fill="#6bcb77"/>
  <text x="832" y="142" text-anchor="middle" fill="#6bcb77" font-size="18" font-weight="700">D</text>
  <text x="832" y="170" text-anchor="middle" fill="#6bcb77" font-size="12" font-weight="700">DISPONIBILIDAD</text>
  <text x="832" y="196" text-anchor="middle" fill="#6b6b8a" font-size="9">acceso cuando hace falta</text>
  <text x="714" y="234" fill="#6b6b8a" font-size="9">• redundancia</text>
  <text x="714" y="252" fill="#6b6b8a" font-size="9">• backups</text>
  <text x="714" y="270" fill="#6b6b8a" font-size="9">• balanceo</text>
  <text x="714" y="288" fill="#6b6b8a" font-size="9">• anti-DDoS</text>
  <text x="714" y="326" fill="#3a3a5a" font-size="8">riesgo tipico: caida, saturacion, ransomware</text>

  <text x="48" y="440" fill="#6b6b8a" font-size="9" letter-spacing="2">// LA SEGURIDAD REAL EXIGE EQUILIBRIO ENTRE LOS TRES PILARES</text>
</svg>
