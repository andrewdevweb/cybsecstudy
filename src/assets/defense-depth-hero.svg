<svg viewBox="0 0 1020 510" xmlns="http://www.w3.org/2000/svg" font-family="'JetBrains Mono', monospace">
  <rect width="1020" height="510" fill="#0a0a0f"/>
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(255,107,107,0.05)" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="1020" height="510" fill="url(#grid)"/>

  <text x="48" y="48" fill="#e8eaf0" font-size="40" font-weight="700">DEFENSA EN PROFUNDIDAD</text>
  <text x="48" y="68" fill="#ff6b6b" font-size="10" letter-spacing="3">CAPAS · PREVENCION · DETECCION · RECUPERACION</text>
  <line x1="48" y1="80" x2="640" y2="80" stroke="#1e1e2e" stroke-width="1"/>

  <rect x="58" y="128" width="904" height="220" rx="10" fill="none" stroke="#ff6b6b" stroke-width="1.5"/>
  <rect x="118" y="158" width="784" height="160" rx="10" fill="none" stroke="#4d96ff" stroke-width="1.5"/>
  <rect x="188" y="188" width="644" height="100" rx="10" fill="none" stroke="#6bcb77" stroke-width="1.5"/>
  <rect x="278" y="214" width="464" height="48" rx="8" fill="#12121a" stroke="#ffd93d" stroke-width="1.5"/>

  <text x="510" y="150" text-anchor="middle" fill="#ff6b6b" font-size="11" font-weight="700">GOBIERNO Y PERSONAS</text>
  <text x="510" y="180" text-anchor="middle" fill="#4d96ff" font-size="11" font-weight="700">IDENTIDAD, SISTEMAS Y RED</text>
  <text x="510" y="210" text-anchor="middle" fill="#6bcb77" font-size="11" font-weight="700">APLICACIONES Y DATOS</text>
  <text x="510" y="244" text-anchor="middle" fill="#ffd93d" font-size="11" font-weight="700">DETECCION Y RESPUESTA</text>

  <text x="48" y="440" fill="#6b6b8a" font-size="9" letter-spacing="2">// SI UNA CAPA FALLA, OTRAS DEBEN PREVENIR, CONTENER O DAR VISIBILIDAD</text>
</svg>
