<svg viewBox="0 0 1020 510" xmlns="http://www.w3.org/2000/svg" font-family="'JetBrains Mono', monospace">
  <rect width="1020" height="510" fill="#0a0a0f"/>
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(255,159,67,0.05)" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="1020" height="510" fill="url(#grid)"/>

  <text x="48" y="48" fill="#e8eaf0" font-size="40" font-weight="700">PROPIEDAD DE ARCHIVOS EN LINUX</text>
  <text x="48" y="68" fill="#ff9f43" font-size="10" letter-spacing="3">CHOWN · CHGRP · MULTIUSUARIO · GRUPOS</text>
  <line x1="48" y1="80" x2="620" y2="80" stroke="#1e1e2e"/>

  <rect x="48" y="116" width="290" height="238" rx="6" fill="#12121a" stroke="#ff9f43" stroke-width="1.5"/>
  <text x="72" y="150" fill="#ff9f43" font-size="13" font-weight="700">OWNER</text>
  <text x="72" y="176" fill="#6b6b8a" font-size="10">el usuario dueño del recurso</text>
  <text x="72" y="212" fill="#6b6b8a" font-size="10">• bloque user</text>
  <text x="72" y="232" fill="#6b6b8a" font-size="10">• creador o reasignado</text>
  <text x="72" y="252" fill="#6b6b8a" font-size="10">• chown usuario archivo</text>

  <rect x="364" y="116" width="290" height="238" rx="6" fill="#12121a" stroke="#4d96ff" stroke-width="1.5"/>
  <text x="388" y="150" fill="#4d96ff" font-size="13" font-weight="700">GROUP</text>
  <text x="388" y="176" fill="#6b6b8a" font-size="10">comparte acceso de forma ordenada</text>
  <text x="388" y="212" fill="#6b6b8a" font-size="10">• bloque group</text>
  <text x="388" y="232" fill="#6b6b8a" font-size="10">• grupos suplementarios</text>
  <text x="388" y="252" fill="#6b6b8a" font-size="10">• chgrp grupo archivo</text>

  <rect x="680" y="116" width="292" height="238" rx="6" fill="#12121a" stroke="#6bcb77" stroke-width="1.5"/>
  <text x="704" y="150" fill="#6bcb77" font-size="13" font-weight="700">MULTIUSUARIO</text>
  <text x="704" y="176" fill="#6b6b8a" font-size="10">el modelo de permisos necesita propiedad</text>
  <text x="704" y="212" fill="#6b6b8a" font-size="10">• trabajo colaborativo</text>
  <text x="704" y="232" fill="#6b6b8a" font-size="10">• SGID en directorios</text>
  <text x="704" y="252" fill="#6b6b8a" font-size="10">• contencion y seguridad</text>

  <text x="48" y="438" fill="#6b6b8a" font-size="9" letter-spacing="2">// LOS PERMISOS DICEN QUE SE PUEDE HACER · LA PROPIEDAD DICE A QUIEN SE LE APLICA</text>
</svg>
