<svg viewBox="0 0 1020 510" xmlns="http://www.w3.org/2000/svg" font-family="'JetBrains Mono', monospace">
  <rect width="1020" height="510" fill="#0a0a0f"/>
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(0,255,159,0.03)" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="1020" height="510" fill="url(#grid)"/>

  <!-- TITLE -->
  <text x="48" y="52" fill="#1a1a2a" font-size="38" font-weight="700">SISTEMAS OPERATIVOS</text>
  <text x="46" y="50" fill="#e8eaf0" font-size="38" font-weight="700">SISTEMAS OPERATIVOS</text>
  <text x="48" y="68" fill="#00ff9f" font-size="9" letter-spacing="3">INTRODUCCIÓN — KERNEL · USER SPACE · GUI · CLI</text>
  <line x1="48" y1="78" x2="440" y2="78" stroke="#1e1e2e" stroke-width="1"/>

  <!-- LEFT: privilege layers stack -->
  <text x="48" y="96" fill="#6b6b8a" font-size="9" letter-spacing="2">// CAPAS DEL SISTEMA</text>

  <!-- User layer -->
  <rect x="48" y="106" width="380" height="44" rx="3" fill="#12121a" stroke="#6b6b8a" stroke-width="1"/>
  <rect x="48" y="106" width="380" height="4" fill="#6b6b8a" opacity="0.4"/>
  <text x="238" y="131" text-anchor="middle" fill="#6b6b8a" font-size="12" font-weight="700">USUARIO</text>
  <text x="238" y="143" text-anchor="middle" fill="#3a3a5a" font-size="9">interacción — GUI / CLI</text>

  <line x1="238" y1="152" x2="238" y2="160" stroke="#1e1e2e" stroke-width="1.5"/>

  <!-- Apps layer -->
  <rect x="48" y="162" width="380" height="44" rx="3" fill="#12121a" stroke="#4d96ff" stroke-width="1.5"/>
  <rect x="48" y="162" width="380" height="4" fill="#4d96ff"/>
  <text x="238" y="187" text-anchor="middle" fill="#4d96ff" font-size="12" font-weight="700">APLICACIONES — User Space</text>
  <text x="238" y="199" text-anchor="middle" fill="#3a3a5a" font-size="9">navegador · editor · juegos · herramientas</text>

  <text x="438" y="224" fill="#ffd93d" font-size="8">← syscall</text>
  <line x1="238" y1="208" x2="238" y2="216" stroke="#ffd93d" stroke-width="1.5" stroke-dasharray="3,2"/>

  <!-- OS layer -->
  <rect x="48" y="218" width="380" height="56" rx="3" fill="#12121a" stroke="#00ff9f" stroke-width="2"/>
  <rect x="48" y="218" width="380" height="5" fill="#00ff9f"/>
  <text x="238" y="242" text-anchor="middle" fill="#00ff9f" font-size="13" font-weight="700">SISTEMA OPERATIVO — Kernel Space</text>
  <text x="238" y="258" text-anchor="middle" fill="#6b6b8a" font-size="9">gestión de procesos · memoria · archivos · dispositivos</text>
  <text x="238" y="268" text-anchor="middle" fill="#3a3a5a" font-size="8">acceso directo y sin restricciones al hardware</text>

  <line x1="238" y1="276" x2="238" y2="284" stroke="#1e1e2e" stroke-width="1.5"/>

  <!-- Hardware layer -->
  <rect x="48" y="286" width="380" height="44" rx="3" fill="#12121a" stroke="#ff9f43" stroke-width="1.5"/>
  <rect x="48" y="286" width="380" height="4" fill="#ff9f43"/>
  <text x="238" y="311" text-anchor="middle" fill="#ff9f43" font-size="12" font-weight="700">HARDWARE</text>
  <text x="238" y="323" text-anchor="middle" fill="#3a3a5a" font-size="9">CPU · RAM · almacenamiento · red · dispositivos</text>

  <!-- GUI vs CLI -->
  <text x="48" y="360" fill="#6b6b8a" font-size="9" letter-spacing="2">// INTERFACES</text>
  <rect x="48"  y="370" width="182" height="60" rx="3" fill="#12121a" stroke="#4d96ff" stroke-width="1"/>
  <rect x="48"  y="370" width="182" height="4" fill="#4d96ff"/>
  <text x="139" y="390" text-anchor="middle" fill="#4d96ff" font-size="11" font-weight="700">GUI</text>
  <text x="139" y="406" text-anchor="middle" fill="#6b6b8a" font-size="9">iconos · ventanas · menús</text>
  <text x="139" y="420" text-anchor="middle" fill="#3a3a5a" font-size="8">intuitivo · visual</text>

  <rect x="246" y="370" width="182" height="60" rx="3" fill="#12121a" stroke="#00ff9f" stroke-width="1"/>
  <rect x="246" y="370" width="182" height="4" fill="#00ff9f"/>
  <text x="337" y="390" text-anchor="middle" fill="#00ff9f" font-size="11" font-weight="700">CLI</text>
  <text x="337" y="406" text-anchor="middle" fill="#6b6b8a" font-size="9">comandos de texto</text>
  <text x="337" y="420" text-anchor="middle" fill="#3a3a5a" font-size="8">potente · pentesting</text>

  <!-- sec note -->
  <rect x="48" y="448" width="380" height="36" rx="2" fill="#12121a" stroke="#ff6b6b" stroke-width="1"/>
  <rect x="48" y="448" width="4" height="36" fill="#ff6b6b"/>
  <text x="62" y="464" fill="#ff6b6b" font-size="9" font-weight="700">⚠ Escalada de privilegios</text>
  <text x="62" y="477" fill="#6b6b8a" font-size="8">User Space → Kernel Space = control total del sistema</text>

  <!-- RIGHT divider -->
  <line x1="460" y1="30" x2="460" y2="490" stroke="#1e1e2e" stroke-width="1"/>

  <!-- RIGHT: OS families -->
  <text x="486" y="44" fill="#6b6b8a" font-size="9" letter-spacing="2">// FAMILIAS DE SISTEMAS OPERATIVOS</text>

  <!-- Windows -->
  <rect x="486" y="54" width="510" height="56" rx="2" fill="#12121a" stroke="#4d96ff" stroke-width="1"/>
  <rect x="486" y="54" width="4" height="56" fill="#4d96ff"/>
  <text x="500" y="72" fill="#4d96ff" font-size="11" font-weight="700">Windows</text>
  <text x="500" y="88" fill="#6b6b8a" font-size="9">Escritorio: Win 10, Win 11 · Servidor: 2019, 2022, 2025</text>
  <text x="500" y="102" fill="#3a3a5a" font-size="8">mayor superficie de ataque del mundo</text>

  <!-- Linux -->
  <rect x="486" y="118" width="510" height="70" rx="2" fill="#12121a" stroke="#00ff9f" stroke-width="1"/>
  <rect x="486" y="118" width="4" height="70" fill="#00ff9f"/>
  <text x="500" y="136" fill="#00ff9f" font-size="11" font-weight="700">Linux — familia de distribuciones</text>
  <text x="500" y="152" fill="#6b6b8a" font-size="9">Ubuntu · Debian · Kali Linux · Alpine · CentOS · Rocky</text>
  <text x="500" y="166" fill="#6b6b8a" font-size="9">+90% de servidores web · dominante en cloud</text>
  <text x="500" y="180" fill="#3a3a5a" font-size="8">Kali Linux = estándar en ciberseguridad y pentesting</text>

  <!-- macOS -->
  <rect x="486" y="196" width="245" height="56" rx="2" fill="#12121a" stroke="#6b6b8a" stroke-width="1"/>
  <rect x="486" y="196" width="4" height="56" fill="#6b6b8a"/>
  <text x="500" y="214" fill="#e8eaf0" font-size="11" font-weight="700">macOS</text>
  <text x="500" y="230" fill="#6b6b8a" font-size="9">Sonoma (14) · Sequoia (15)</text>
  <text x="500" y="244" fill="#3a3a5a" font-size="8">basado en Unix · popular en desarrollo</text>

  <!-- Android/iOS -->
  <rect x="741" y="196" width="255" height="56" rx="2" fill="#12121a" stroke="#6bcb77" stroke-width="1"/>
  <rect x="741" y="196" width="4" height="56" fill="#6bcb77"/>
  <text x="755" y="214" fill="#6bcb77" font-size="11" font-weight="700">Android / iOS</text>
  <text x="755" y="230" fill="#6b6b8a" font-size="9">Android 14-16 (Linux) · iOS 17-18</text>
  <text x="755" y="244" fill="#3a3a5a" font-size="8">SO móviles · objetivo alto en cibersec</text>

  <!-- OS types table -->
  <text x="486" y="274" fill="#6b6b8a" font-size="9" letter-spacing="2">// TIPOS DE SO</text>
  <rect x="486" y="284" width="510" height="180" rx="2" fill="#12121a" stroke="#1e1e2e" stroke-width="1"/>

  <rect x="486" y="284" width="510" height="26" rx="2 2 0 0" fill="#1e1e2e"/>
  <text x="540" y="301" text-anchor="middle" fill="#6b6b8a" font-size="9" font-weight="700">TIPO</text>
  <text x="730" y="301" text-anchor="middle" fill="#6b6b8a" font-size="9" font-weight="700">CARACTERÍSTICAS</text>

  <text x="500" y="324" fill="#4d96ff" font-size="9" font-weight="700">Escritorio</text>
  <text x="600" y="324" fill="#6b6b8a" font-size="8">GUI avanzada · multitarea · centrado en usuario</text>
  <line x1="494" y1="330" x2="988" y2="330" stroke="#1e1e2e" stroke-width="0.5"/>

  <text x="500" y="348" fill="#ff9f43" font-size="9" font-weight="700">Servidor</text>
  <text x="600" y="348" fill="#6b6b8a" font-size="8">sin GUI · máx. uptime · multiusuario · SSH</text>
  <line x1="494" y1="354" x2="988" y2="354" stroke="#1e1e2e" stroke-width="0.5"/>

  <text x="500" y="372" fill="#6bcb77" font-size="9" font-weight="700">Móvil</text>
  <text x="600" y="372" fill="#6b6b8a" font-size="8">táctil · bajo consumo · apps aisladas</text>
  <line x1="494" y1="378" x2="988" y2="378" stroke="#1e1e2e" stroke-width="0.5"/>

  <text x="500" y="396" fill="#ffd93d" font-size="9" font-weight="700">Embebido</text>
  <text x="600" y="396" fill="#6b6b8a" font-size="8">mínimo tamaño · propósito único · IoT</text>
  <line x1="494" y1="402" x2="988" y2="402" stroke="#1e1e2e" stroke-width="0.5"/>

  <text x="500" y="420" fill="#c77dff" font-size="9" font-weight="700">Virtual/Cloud</text>
  <text x="600" y="420" fill="#6b6b8a" font-size="8">ligero · escalable · despliegue rápido</text>
  <line x1="494" y1="426" x2="988" y2="426" stroke="#1e1e2e" stroke-width="0.5"/>

  <text x="500" y="444" fill="#ff6b6b" font-size="9" font-weight="700">RTOS</text>
  <text x="600" y="444" fill="#6b6b8a" font-size="8">tiempo real · aviones · coches · marcapasos</text>

  <text x="738" y="475" text-anchor="middle" fill="#3a3a5a" font-size="8">ningún SO es perfecto para todas las situaciones</text>
</svg>
