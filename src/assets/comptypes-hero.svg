  <line x1="310" y1="313" x2="302" y2="313" stroke="#c77dff" stroke-width="1" opacity="0.4"/>
  <line x1="310" y1="321" x2="302" y2="321" stroke="#c77dff" stroke-width="1" opacity="0.4"/>
  <line x1="370" y1="305" x2="378" y2="305" stroke="#c77dff" stroke-width="1" opacity="0.4"/>
  <line x1="370" y1="313" x2="378" y2="313" stroke="#c77dff" stroke-width="1" opacity="0.4"/>
  <line x1="370" y1="321" x2="378" y2="321" stroke="#c77dff" stroke-width="1" opacity="0.4"/>
