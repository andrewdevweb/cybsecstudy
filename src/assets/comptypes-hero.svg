  <rect x="524" y="224" width="90" height="20" rx="2" fill="rgba(0,255,159,0.06)" stroke="#00ff9f" stroke-width="0.5"/>
  <text x="569" y="238" text-anchor="middle" fill="#00ff9f" font-size="9">Portátil/PC</text>
  <text x="630" y="238" fill="#6b6b8a" font-size="9">Malware, phishing, USB malicioso</text>

  <rect x="524" y="252" width="90" height="20" rx="2" fill="rgba(255,107,107,0.06)" stroke="#ff6b6b" stroke-width="0.5"/>
  <text x="569" y="266" text-anchor="middle" fill="#ff6b6b" font-size="9">Servidor</text>
  <text x="630" y="266" fill="#6b6b8a" font-size="9">RCE, SQLi, DDoS, exploits de servicios</text>

  <rect x="524" y="280" width="90" height="20" rx="2" fill="rgba(107,203,119,0.06)" stroke="#6bcb77" stroke-width="0.5"/>
  <text x="569" y="294" text-anchor="middle" fill="#6bcb77" font-size="9">Smartphone</text>
  <text x="630" y="294" fill="#6b6b8a" font-size="9">Apps maliciosas, MitM en WiFi, spyware</text>

  <rect x="524" y="308" width="90" height="20" rx="2" fill="rgba(255,217,61,0.06)" stroke="#ffd93d" stroke-width="0.5"/>
  <text x="569" y="322" text-anchor="middle" fill="#ffd93d" font-size="9">IoT</text>
  <text x="630" y="322" fill="#6b6b8a" font-size="9">Credenciales default, firmware sin parchear</text>

  <rect x="524" y="336" width="90" height="20" rx="2" fill="rgba(199,125,255,0.06)" stroke="#c77dff" stroke-width="0.5"/>
  <text x="569" y="350" text-anchor="middle" fill="#c77dff" font-size="9">Embebido</text>
  <text x="630" y="350" fill="#6b6b8a" font-size="9">Acceso físico, tampering, implantes HW</text>

  <rect x="516" y="364" width="484" height="40" rx="0 0 2 2" fill="rgba(255,107,107,0.04)"/>
  <text x="758" y="381" text-anchor="middle" fill="#ff6b6b" font-size="9" font-weight="700">⚠ Mirai (2016) — 600.000 dispositivos IoT comprometidos</text>
  <text x="758" y="396" text-anchor="middle" fill="#6b6b8a" font-size="8">tumbó Dyn DNS · inaccesible Twitter, Netflix, Reddit durante horas</text>

  <!-- quote -->
  <rect x="516" y="428" width="484" height="52" rx="2" fill="#12121a" stroke="#00ff9f" stroke-width="1"/>
  <rect x="516" y="428" width="4" height="52" fill="#00ff9f"/>
  <text x="530" y="450" fill="#e8eaf0" font-size="11" font-style="italic">"No existe el ordenador perfecto.</text>
  <text x="530" y="466" fill="#e8eaf0" font-size="11" font-style="italic">Solo existe la herramienta adecuada para cada tarea."</text>
