  <text x="620" y="102" text-anchor="middle" fill="#ffd93d" font-size="10">Conectado a red</text>
  <text x="780" y="102" text-anchor="middle" fill="#c77dff" font-size="10">Puede no conectarse</text>
  <line x1="526" y1="110" x2="990" y2="110" stroke="#1e1e2e" stroke-width="0.5"/>
