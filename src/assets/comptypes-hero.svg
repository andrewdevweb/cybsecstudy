  <circle cx="436" cy="142" r="3" fill="#ff6b6b"/>
  <rect x="360" y="152" width="84" height="12" rx="1" fill="#0a0a0f" stroke="#ff6b6b" stroke-width="0.5" opacity="0.5"/>
