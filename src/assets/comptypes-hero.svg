  <rect x="296" y="280" width="156" height="80" rx="4" fill="#12121a" stroke="#c77dff" stroke-width="1.5"/>
  <rect x="310" y="295" width="60" height="40" rx="2" fill="#0a0a0f" stroke="#c77dff" stroke-width="1" opacity="0.5"/>
