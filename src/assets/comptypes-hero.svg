  <path d="M 202 310 Q 202 298 218 298 Q 234 298 234 310" fill="none" stroke="#ffd93d" stroke-width="1.5" opacity="0.4"/>
  <path d="M 202 320 Q 202 303 218 303 Q 234 303 234 320" fill="none" stroke="#ffd93d" stroke-width="1.5" opacity="0.25"/>
