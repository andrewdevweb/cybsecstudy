  <text x="620" y="128" text-anchor="middle" fill="#ffd93d" font-size="10">Aparece en la red</text>
  <text x="780" y="128" text-anchor="middle" fill="#c77dff" font-size="10">Completamente invisible</text>
  <line x1="526" y1="136" x2="990" y2="136" stroke="#1e1e2e" stroke-width="0.5"/>
  <text x="526" y="154" fill="#6b6b8a" font-size="10">Ejemplo</text>
  <text x="620" y="154" text-anchor="middle" fill="#ffd93d" font-size="10">Termostato Nest</text>
  <text x="780" y="154" text-anchor="middle" fill="#c77dff" font-size="10">ABS del coche</text>

  <!-- attack vectors -->
  <text x="516" y="202" fill="#6b6b8a" font-size="9" letter-spacing="2">// VECTORES DE ATAQUE POR TIPO</text>
  <rect x="516" y="212" width="484" height="200" rx="2" fill="#12121a" stroke="#1e1e2e" stroke-width="1"/>
  <rect x="516" y="212" width="484" height="4" fill="#ff6b6b" opacity="0.6"/>

