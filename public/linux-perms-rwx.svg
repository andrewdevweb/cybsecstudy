<svg viewBox="0 0 700 180" xmlns="http://www.w3.org/2000/svg" font-family="'JetBrains Mono', monospace">
  <rect width="700" height="180" fill="#0a0a0f"/>

  <!-- permission string display -->
  <text x="350" y="30" text-anchor="middle" fill="#6b6b8a" font-size="9" letter-spacing="3">// DESCOMPOSICIÓN DE PERMISOS</text>

  <!-- Full string -->
  <rect x="20" y="44" width="660" height="50" rx="2" fill="#0d0d14" stroke="#1e1e2e" stroke-width="1"/>

  <!-- tipo -->
  <text x="52"  y="75" text-anchor="middle" fill="#6b6b8a"  font-size="22" font-weight="700">-</text>
  <!-- user -->
  <text x="92"  y="75" text-anchor="middle" fill="#ff9f43"  font-size="22" font-weight="700">r</text>
  <text x="118" y="75" text-anchor="middle" fill="#ff9f43"  font-size="22" font-weight="700">w</text>
  <text x="144" y="75" text-anchor="middle" fill="#6b6b8a"  font-size="22" font-weight="700">-</text>
  <!-- group -->
  <text x="186" y="75" text-anchor="middle" fill="#4d96ff"  font-size="22" font-weight="700">r</text>
  <text x="212" y="75" text-anchor="middle" fill="#6b6b8a"  font-size="22" font-weight="700">-</text>
  <text x="238" y="75" text-anchor="middle" fill="#6b6b8a"  font-size="22" font-weight="700">-</text>
  <!-- others -->
  <text x="280" y="75" text-anchor="middle" fill="#6bcb77"  font-size="22" font-weight="700">r</text>
  <text x="306" y="75" text-anchor="middle" fill="#6b6b8a"  font-size="22" font-weight="700">-</text>
  <text x="332" y="75" text-anchor="middle" fill="#6b6b8a"  font-size="22" font-weight="700">-</text>

  <!-- octal -->
  <text x="400" y="65" fill="#6b6b8a" font-size="9">octal:</text>
  <text x="440" y="65" fill="#ff9f43" font-size="18" font-weight="700">6</text>
  <text x="460" y="65" fill="#4d96ff" font-size="18" font-weight="700">4</text>
  <text x="480" y="65" fill="#6bcb77" font-size="18" font-weight="700">4</text>

  <text x="400" y="82" fill="#6b6b8a" font-size="8">rw- = 4+2+0 = 6</text>
  <text x="400" y="93" fill="#6b6b8a" font-size="8">r-- = 4+0+0 = 4</text>

  <!-- labels below -->
  <text x="52"  y="107" text-anchor="middle" fill="#3a3a5a"  font-size="8">tipo</text>
  <text x="118" y="107" text-anchor="middle" fill="#ff9f43"  font-size="8">user (u)</text>
  <text x="212" y="107" text-anchor="middle" fill="#4d96ff"  font-size="8">group (g)</text>
  <text x="306" y="107" text-anchor="middle" fill="#6bcb77"  font-size="8">others (o)</text>

  <!-- bottom row: r w x table -->
  <rect x="20"  y="122" width="200" height="46" rx="2" fill="#12121a" stroke="#ff9f43" stroke-width="1"/>
  <text x="120" y="140" text-anchor="middle" fill="#ff9f43" font-size="10" font-weight="700">r=4  w=2  x=1</text>
  <text x="120" y="156" text-anchor="middle" fill="#6b6b8a" font-size="8">suma para cada entidad</text>
  <text x="120" y="164" text-anchor="middle" fill="#3a3a5a" font-size="7">max: 7 (rwx) · min: 0 (---)</text>

  <rect x="230" y="122" width="200" height="46" rx="2" fill="#12121a" stroke="#4d96ff" stroke-width="1"/>
  <text x="330" y="140" text-anchor="middle" fill="#4d96ff" font-size="10" font-weight="700">archivo vs directorio</text>
  <text x="330" y="154" text-anchor="middle" fill="#6b6b8a" font-size="8">r: leer / listar con ls</text>
  <text x="330" y="164" text-anchor="middle" fill="#6b6b8a" font-size="8">x: ejecutar / entrar con cd</text>

  <rect x="440" y="122" width="240" height="46" rx="2" fill="#12121a" stroke="#ff6b6b" stroke-width="1"/>
  <text x="560" y="140" text-anchor="middle" fill="#ff6b6b" font-size="10" font-weight="700">SUID / SGID / Sticky</text>
  <text x="560" y="154" text-anchor="middle" fill="#6b6b8a" font-size="8">s en user pos = SUID (4xxx)</text>
  <text x="560" y="164" text-anchor="middle" fill="#6b6b8a" font-size="8">t en others pos = sticky (1xxx)</text>
</svg>
