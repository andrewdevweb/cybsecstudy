<svg viewBox="0 0 700 260" xmlns="http://www.w3.org/2000/svg" font-family="'JetBrains Mono', monospace">
  <rect width="700" height="260" fill="#0a0a0f"/>
  <text x="24" y="28" fill="#6b6b8a" font-size="10" letter-spacing="2">// CONTROLES POR CAPA</text>

  <rect x="20" y="50" width="210" height="170" rx="4" fill="#12121a" stroke="#ff6b6b" stroke-width="1.5"/>
  <text x="125" y="78" text-anchor="middle" fill="#ff6b6b" font-size="11" font-weight="700">PREVENTIVOS</text>
  <text x="42" y="108" fill="#6b6b8a" font-size="9">• MFA</text>
  <text x="42" y="126" fill="#6b6b8a" font-size="9">• hardening</text>
  <text x="42" y="144" fill="#6b6b8a" font-size="9">• parches</text>
  <text x="42" y="162" fill="#6b6b8a" font-size="9">• segmentacion</text>
  <text x="42" y="180" fill="#6b6b8a" font-size="9">• validacion de entradas</text>

  <rect x="245" y="50" width="210" height="170" rx="4" fill="#12121a" stroke="#4d96ff" stroke-width="1.5"/>
  <text x="350" y="78" text-anchor="middle" fill="#4d96ff" font-size="11" font-weight="700">DETECTIVOS</text>
  <text x="267" y="108" fill="#6b6b8a" font-size="9">• logs</text>
  <text x="267" y="126" fill="#6b6b8a" font-size="9">• alertas</text>
  <text x="267" y="144" fill="#6b6b8a" font-size="9">• EDR</text>
  <text x="267" y="162" fill="#6b6b8a" font-size="9">• IDS</text>
  <text x="267" y="180" fill="#6b6b8a" font-size="9">• SIEM</text>

  <rect x="470" y="50" width="210" height="170" rx="4" fill="#12121a" stroke="#6bcb77" stroke-width="1.5"/>
  <text x="575" y="78" text-anchor="middle" fill="#6bcb77" font-size="11" font-weight="700">CORRECTIVOS</text>
  <text x="492" y="108" fill="#6b6b8a" font-size="9">• backups</text>
  <text x="492" y="126" fill="#6b6b8a" font-size="9">• restauracion</text>
  <text x="492" y="144" fill="#6b6b8a" font-size="9">• failover</text>
  <text x="492" y="162" fill="#6b6b8a" font-size="9">• respuesta a incidentes</text>
  <text x="492" y="180" fill="#6b6b8a" font-size="9">• continuidad</text>

  <text x="350" y="248" text-anchor="middle" fill="#3a3a5a" font-size="8">La profundidad real mezcla prevencion, visibilidad y capacidad de recuperacion.</text>
</svg>
