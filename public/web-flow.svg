  <line x1="154" y1="72" x2="234" y2="72" stroke="#00ff9f" stroke-width="1.5" marker-end="url(#ga)"/>
  <text x="194" y="65" text-anchor="middle" fill="#00ff9f" font-size="8" font-weight="700">Request</text>
  <line x1="234" y1="88" x2="154" y2="88" stroke="#4d96ff" stroke-width="1.5" marker-end="url(#ba)"/>
  <text x="194" y="102" text-anchor="middle" fill="#4d96ff" font-size="8" font-weight="700">Response</text>

  <!-- INTERNET -->
  <rect x="240" y="30" width="170" height="100" rx="2" fill="#12121a" stroke="#4d96ff" stroke-width="1"/>
  <ellipse cx="325" cy="80" rx="40" ry="26" fill="none" stroke="#4d96ff" stroke-width="1.5"/>
  <ellipse cx="325" cy="80" rx="14" ry="26" fill="none" stroke="#4d96ff" stroke-width="1" opacity="0.5"/>
  <line x1="285" y1="80" x2="365" y2="80" stroke="#4d96ff" stroke-width="1" opacity="0.5"/>
  <line x1="288" y1="62" x2="362" y2="62" stroke="#4d96ff" stroke-width="1" opacity="0.3"/>
  <line x1="288" y1="98" x2="362" y2="98" stroke="#4d96ff" stroke-width="1" opacity="0.3"/>
  <text x="325" y="148" text-anchor="middle" fill="#4d96ff" font-size="9" font-weight="700">INTERNET</text>
  <text x="325" y="162" text-anchor="middle" fill="#6b6b8a" font-size="8">la red global</text>

  <!-- arrows 2 -->
  <line x1="414" y1="72" x2="494" y2="72" stroke="#00ff9f" stroke-width="1.5" marker-end="url(#ga)"/>
  <text x="454" y="65" text-anchor="middle" fill="#00ff9f" font-size="8" font-weight="700">Request</text>
  <line x1="494" y1="88" x2="414" y2="88" stroke="#4d96ff" stroke-width="1.5" marker-end="url(#ba)"/>
  <text x="454" y="102" text-anchor="middle" fill="#4d96ff" font-size="8" font-weight="700">Response</text>

  <!-- SERVER -->
  <rect x="500" y="30" width="140" height="100" rx="2" fill="#12121a" stroke="#ff9f43" stroke-width="1"/>
  <rect x="520" y="44" width="100" height="70" rx="1" fill="#0a0a0f" stroke="#ff9f43" stroke-width="1"/>
  <rect x="524" y="48" width="92" height="12" rx="1" fill="#ff9f43" opacity="0.15"/>
  <circle cx="609" cy="54" r="3" fill="#ff9f43"/>
  <rect x="524" y="64" width="92" height="12" rx="1" fill="#ff9f43" opacity="0.1"/>
  <circle cx="609" cy="70" r="3" fill="#ff9f43" opacity="0.6"/>
  <rect x="524" y="80" width="92" height="12" rx="1" fill="#ff9f43" opacity="0.08"/>
