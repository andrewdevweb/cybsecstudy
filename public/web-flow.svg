<svg viewBox="0 0 660 180" xmlns="http://www.w3.org/2000/svg" font-family="'JetBrains Mono', monospace">
  <rect width="660" height="180" fill="#0a0a0f"/>

  <!-- BROWSER -->
  <rect x="20" y="30" width="130" height="100" rx="2" fill="#12121a" stroke="#00ff9f" stroke-width="1"/>
  <rect x="28" y="40" width="114" height="76" rx="1" fill="#0a0a0f" stroke="#1e1e2e" stroke-width="1"/>
  <rect x="28" y="40" width="114" height="14" rx="1 1 0 0" fill="#1e1e2e"/>
  <circle cx="35" cy="47" r="2.5" fill="#ff6b6b"/>
  <circle cx="43" cy="47" r="2.5" fill="#ffd93d"/>
  <circle cx="51" cy="47" r="2.5" fill="#6bcb77"/>
  <rect x="60" y="44" width="76" height="6" rx="1" fill="#0d0d18"/>
  <rect x="33" y="60" width="104" height="6" rx="1" fill="#00ff9f" opacity="0.15"/>
  <rect x="33" y="70" width="80" height="4" rx="1" fill="#1e1e2e"/>
  <rect x="33" y="78" width="96" height="4" rx="1" fill="#1e1e2e"/>
  <rect x="33" y="86" width="70" height="4" rx="1" fill="#1e1e2e"/>
  <rect x="33" y="96" width="88" height="4" rx="1" fill="#1e1e2e"/>
  <text x="85" y="148" text-anchor="middle" fill="#00ff9f" font-size="9" font-weight="700">BROWSER</text>
