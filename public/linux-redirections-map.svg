<svg viewBox="0 0 980 420" xmlns="http://www.w3.org/2000/svg" font-family="'JetBrains Mono', monospace">
  <rect width="980" height="420" fill="#0a0a0f"/>
  <text x="40" y="42" fill="#e8eaf0" font-size="28" font-weight="700">MAPA DE REDIRECCIONES</text>
  <text x="40" y="64" fill="#ff9f43" font-size="10" letter-spacing="3">ENTRADA, SALIDA NORMAL Y ERRORES COMO FLUJOS</text>
  <line x1="40" y1="78" x2="700" y2="78" stroke="#1e1e2e"/>

  <rect x="50" y="146" width="170" height="98" rx="8" fill="#12121a" stroke="#6bcb77"/>
  <text x="135" y="182" text-anchor="middle" fill="#6bcb77" font-size="14" font-weight="700">archivo de entrada</text>
  <text x="135" y="206" text-anchor="middle" fill="#6b6b8a" font-size="10">&lt; alimenta STDIN</text>

  <rect x="364" y="118" width="250" height="156" rx="10" fill="#12121a" stroke="#1e1e2e"/>
  <text x="489" y="162" text-anchor="middle" fill="#e8eaf0" font-size="17" font-weight="700">comando</text>
  <text x="489" y="192" text-anchor="middle" fill="#6b6b8a" font-size="10">lee por STDIN y escribe por STDOUT o STDERR</text>
  <text x="489" y="228" text-anchor="middle" fill="#4d96ff" font-size="11">ejemplo: sort, wc, echo, ls, find</text>

  <rect x="760" y="104" width="170" height="98" rx="8" fill="#12121a" stroke="#ff9f43"/>
  <text x="845" y="140" text-anchor="middle" fill="#ff9f43" font-size="14" font-weight="700">salida normal</text>
  <text x="845" y="164" text-anchor="middle" fill="#6b6b8a" font-size="10">&gt; o &gt;&gt; reciben STDOUT</text>

  <rect x="760" y="238" width="170" height="98" rx="8" fill="#12121a" stroke="#ff6b6b"/>
  <text x="845" y="274" text-anchor="middle" fill="#ff6b6b" font-size="14" font-weight="700">errores</text>
  <text x="845" y="298" text-anchor="middle" fill="#6b6b8a" font-size="10">2&gt; recibe STDERR</text>

  <path d="M 220 194 C 286 194, 300 194, 364 194" fill="none" stroke="#6bcb77" stroke-width="3"/>
  <polygon points="364,194 352,188 352,200" fill="#6bcb77"/>

  <path d="M 614 168 C 676 168, 700 154, 760 154" fill="none" stroke="#ff9f43" stroke-width="3"/>
  <polygon points="760,154 748,148 748,160" fill="#ff9f43"/>

  <path d="M 614 232 C 678 232, 700 286, 760 286" fill="none" stroke="#ff6b6b" stroke-width="3"/>
  <polygon points="760,286 748,280 748,292" fill="#ff6b6b"/>

  <text x="40" y="382" fill="#6b6b8a" font-size="9" letter-spacing="2">// ARCHIVOS A PROGRAMAS Y PROGRAMAS A ARCHIVOS: ESA ES LA LOGICA DE LAS REDIRECCIONES</text>
</svg>
