<svg viewBox="0 0 700 200" xmlns="http://www.w3.org/2000/svg" font-family="'JetBrains Mono', monospace">
  <rect width="700" height="200" fill="#0a0a0f"/>
  <defs>
    <marker id="ra" markerWidth="7" markerHeight="7" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L7,3 z" fill="#ff6b6b"/></marker>
    <marker id="ga" markerWidth="7" markerHeight="7" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L7,3 z" fill="#00ff9f"/></marker>
  </defs>

  <text x="350" y="20" text-anchor="middle" fill="#6b6b8a" font-size="9" letter-spacing="2">// MODELO DE RESPONSABILIDAD COMPARTIDA</text>

  <!-- Customer side -->
  <rect x="20" y="30" width="310" height="152" rx="4" fill="#12121a" stroke="#00ff9f" stroke-width="1.5"/>
  <rect x="20" y="30" width="310" height="5" fill="#00ff9f"/>
  <text x="175" y="52" text-anchor="middle" fill="#00ff9f" font-size="11" font-weight="700">CLIENTE — seguridad EN la nube</text>
  <text x="36" y="72" fill="#b0b0c8" font-size="9">▸ Configuración de servicios y recursos</text>
  <text x="36" y="88" fill="#b0b0c8" font-size="9">▸ Gestión de identidades y accesos (IAM)</text>
  <text x="36" y="104" fill="#b0b0c8" font-size="9">▸ Cifrado de datos en reposo y tránsito</text>
  <text x="36" y="120" fill="#b0b0c8" font-size="9">▸ Actualizaciones del SO (en IaaS)</text>
  <text x="36" y="136" fill="#b0b0c8" font-size="9">▸ Configuración de firewalls y redes</text>
  <text x="36" y="152" fill="#ff6b6b" font-size="8">⚠ Misconfiguration = responsabilidad del cliente</text>
  <text x="36" y="166" fill="#3a3a5a" font-size="8">S3 público · IAM permisivo · SO sin parchear</text>

  <!-- Provider side -->
  <rect x="370" y="30" width="310" height="152" rx="4" fill="#12121a" stroke="#4d96ff" stroke-width="1.5"/>
  <rect x="370" y="30" width="310" height="5" fill="#4d96ff"/>
  <text x="525" y="52" text-anchor="middle" fill="#4d96ff" font-size="11" font-weight="700">PROVEEDOR — seguridad DE la nube</text>
  <text x="386" y="72" fill="#b0b0c8" font-size="9">▸ Seguridad física de centros de datos</text>
  <text x="386" y="88" fill="#b0b0c8" font-size="9">▸ Hardware, red e infraestructura</text>
  <text x="386" y="104" fill="#b0b0c8" font-size="9">▸ Hipervisores y capa de virtualización</text>
  <text x="386" y="120" fill="#b0b0c8" font-size="9">▸ Disponibilidad y redundancia global</text>
  <text x="386" y="136" fill="#b0b0c8" font-size="9">▸ Cumplimiento normativo de la plataforma</text>
  <text x="386" y="152" fill="#6b6b8a" font-size="8">AWS · Azure · GCP tienen certificaciones</text>
  <text x="386" y="166" fill="#3a3a5a" font-size="8">ISO 27001 · SOC 2 · PCI DSS · HIPAA</text>
</svg>
