<svg viewBox="0 0 700 240" xmlns="http://www.w3.org/2000/svg" font-family="'JetBrains Mono', monospace">
  <rect width="700" height="240" fill="#0a0a0f"/>
  <text x="24" y="28" fill="#6b6b8a" font-size="10" letter-spacing="2">// LOS TRES FLUJOS</text>

  <rect x="30" y="52" width="200" height="148" rx="4" fill="#12121a" stroke="#ff9f43" stroke-width="1.5"/>
  <text x="130" y="80" text-anchor="middle" fill="#ff9f43" font-size="11" font-weight="700">STDIN</text>
  <text x="50" y="108" fill="#6b6b8a" font-size="9">• entrada</text>
  <text x="50" y="126" fill="#6b6b8a" font-size="9">• teclado por defecto</text>
  <text x="50" y="144" fill="#6b6b8a" font-size="9">• descriptor 0</text>

  <rect x="250" y="52" width="200" height="148" rx="4" fill="#12121a" stroke="#4d96ff" stroke-width="1.5"/>
  <text x="350" y="80" text-anchor="middle" fill="#4d96ff" font-size="11" font-weight="700">STDOUT</text>
  <text x="270" y="108" fill="#6b6b8a" font-size="9">• salida normal</text>
  <text x="270" y="126" fill="#6b6b8a" font-size="9">• resultados utiles</text>
  <text x="270" y="144" fill="#6b6b8a" font-size="9">• descriptor 1</text>

  <rect x="470" y="52" width="200" height="148" rx="4" fill="#12121a" stroke="#6bcb77" stroke-width="1.5"/>
  <text x="570" y="80" text-anchor="middle" fill="#6bcb77" font-size="11" font-weight="700">STDERR</text>
  <text x="490" y="108" fill="#6b6b8a" font-size="9">• errores</text>
  <text x="490" y="126" fill="#6b6b8a" font-size="9">• diagnostico</text>
  <text x="490" y="144" fill="#6b6b8a" font-size="9">• descriptor 2</text>

  <text x="350" y="230" text-anchor="middle" fill="#3a3a5a" font-size="8">La separacion entre STDOUT y STDERR es una de las bases del diseño Unix.</text>
</svg>
