<svg viewBox="0 0 740 300" xmlns="http://www.w3.org/2000/svg" font-family="'JetBrains Mono', monospace">
  <rect width="740" height="300" fill="#0a0a0f"/>
  <defs>
    <marker id="ga" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#00ff9f"/></marker>
    <marker id="oa" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#ff9f43"/></marker>
  </defs>

  <!-- BROWSER — left, vertically centered -->
  <rect x="30" y="90" width="120" height="90" rx="4" fill="#12121a" stroke="#00ff9f" stroke-width="1.5"/>
  <rect x="30" y="90" width="120" height="18" rx="4 4 0 0" fill="#1e1e2e"/>
  <circle cx="44" cy="99" r="3.5" fill="#ff6b6b"/>
  <circle cx="55" cy="99" r="3.5" fill="#ffd93d"/>
  <circle cx="66" cy="99" r="3.5" fill="#6bcb77"/>
  <rect x="42" y="118" width="96" height="8" rx="2" fill="#00ff9f" opacity="0.12"/>
  <rect x="42" y="132" width="68" height="6" rx="2" fill="#1e1e2e"/>
  <rect x="42" y="144" width="82" height="6" rx="2" fill="#1e1e2e"/>
  <text x="90" y="196" text-anchor="middle" fill="#00ff9f" font-size="11" font-weight="700">CLIENTE</text>

  <!-- arrow → LB -->
  <line x1="152" y1="135" x2="208" y2="135" stroke="#00ff9f" stroke-width="2" marker-end="url(#ga)"/>
  <text x="180" y="126" text-anchor="middle" fill="#00ff9f" font-size="9">solicitud</text>

  <!-- LOAD BALANCER — center -->
  <rect x="210" y="60" width="160" height="150" rx="4" fill="#12121a" stroke="#ff9f43" stroke-width="1.5"/>
  <text x="290" y="118" text-anchor="middle" fill="#ff9f43" font-size="13" font-weight="700">LOAD</text>
  <text x="290" y="135" text-anchor="middle" fill="#ff9f43" font-size="13" font-weight="700">BALANCER</text>
  <line x1="228" y1="148" x2="352" y2="148" stroke="#1e1e2e" stroke-width="1"/>
  <text x="290" y="165" text-anchor="middle" fill="#6b6b8a" font-size="10">round-robin</text>
  <text x="290" y="180" text-anchor="middle" fill="#6b6b8a" font-size="10">ponderado</text>

  <!-- arrows → servers -->
  <line x1="372" y1="100" x2="442" y2="65" stroke="#ff9f43" stroke-width="1.8" marker-end="url(#oa)"/>
  <line x1="372" y1="135" x2="442" y2="135" stroke="#ff9f43" stroke-width="1.8" marker-end="url(#oa)"/>
  <line x1="372" y1="170" x2="442" y2="208" stroke="#ff9f43" stroke-width="1.8" marker-end="url(#oa)"/>

  <!-- SERVER 1 — top right, healthy -->
  <rect x="444" y="20" width="260" height="80" rx="4" fill="#12121a" stroke="#6bcb77" stroke-width="1.5"/>
  <rect x="460" y="34" width="228" height="12" rx="2" fill="#6bcb77" opacity="0.12"/>
  <circle cx="678" cy="40" r="5" fill="#6bcb77"/>
  <rect x="460" y="52" width="228" height="12" rx="2" fill="#1e1e2e"/>
  <circle cx="678" cy="58" r="5" fill="#6bcb77" opacity="0.5"/>
  <rect x="460" y="70" width="180" height="10" rx="2" fill="#1e1e2e"/>
  <text x="560" y="116" text-anchor="middle" fill="#6bcb77" font-size="11" font-weight="700">SERVER 1</text>
  <text x="560" y="130" text-anchor="middle" fill="#6b6b8a" font-size="9">Apache / Nginx — activo</text>

  <!-- SERVER 2 — middle right, healthy -->
  <rect x="444" y="95" width="260" height="80" rx="4" fill="#12121a" stroke="#6bcb77" stroke-width="1.5"/>
  <rect x="460" y="109" width="228" height="12" rx="2" fill="#6bcb77" opacity="0.12"/>
  <circle cx="678" cy="115" r="5" fill="#6bcb77"/>
  <rect x="460" y="127" width="228" height="12" rx="2" fill="#1e1e2e"/>
  <circle cx="678" cy="133" r="5" fill="#6bcb77" opacity="0.5"/>
  <rect x="460" y="145" width="180" height="10" rx="2" fill="#1e1e2e"/>
  <text x="560" y="191" text-anchor="middle" fill="#6bcb77" font-size="11" font-weight="700">SERVER 2</text>
  <text x="560" y="205" text-anchor="middle" fill="#6b6b8a" font-size="9">Apache / Nginx — activo</text>

  <!-- SERVER 3 — bottom right, down -->
  <rect x="444" y="170" width="260" height="80" rx="4" fill="#12121a" stroke="#ff6b6b" stroke-width="1.5"/>
  <rect x="460" y="184" width="228" height="12" rx="2" fill="#ff6b6b" opacity="0.08"/>
  <circle cx="678" cy="190" r="5" fill="#ff6b6b" opacity="0.4"/>
  <rect x="460" y="202" width="228" height="12" rx="2" fill="#1e1e2e"/>
  <circle cx="678" cy="208" r="5" fill="#ff6b6b" opacity="0.2"/>
  <rect x="460" y="220" width="180" height="10" rx="2" fill="#1e1e2e"/>
  <text x="560" y="266" text-anchor="middle" fill="#ff6b6b" font-size="11" font-weight="700">SERVER 3 — ⚠ no responde</text>
  <text x="560" y="280" text-anchor="middle" fill="#6b6b8a" font-size="9">health check fallido — excluido del pool</text>

</svg>
