  <rect x="285" y="70" width="130" height="94" rx="4" fill="#12121a" stroke="#4d96ff" stroke-width="1.5"/>
  <text x="350" y="112" text-anchor="middle" fill="#4d96ff" font-size="10" font-weight="700">PROGRAMA</text>

