<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0f1a"/>
      <stop offset="100%" style="stop-color:#0a0a0f"/>
    </linearGradient>
    <linearGradient id="lockGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00ffc8"/>
      <stop offset="100%" style="stop-color:#00cc88"/>
    </linearGradient>
  </defs>

  <!-- Background with rounded corners -->
  <rect width="64" height="64" fill="url(#bg)" rx="10"/>

  <!-- Subtle border -->
  <rect width="64" height="64" fill="none" stroke="#00ff9f" stroke-width="1.5" rx="10" opacity="0.3"/>

  <!-- Lock shackle -->
  <path d="M23 27V21.5a9 9 0 0 1 18 0V27" fill="none" stroke="url(#lockGrad)" stroke-width="3" stroke-linecap="round"/>

  <!-- Lock body -->
  <rect x="15" y="27" width="34" height="22" rx="4" fill="url(#lockGrad)"/>

  <!-- Keyhole circle -->
  <circle cx="32" cy="36" r="3.5" fill="#0a0a0f"/>

  <!-- Keyhole slot -->
  <rect x="30.5" y="36" width="3" height="5" rx="1" fill="#0a0a0f"/>

  <!-- CybSS text -->
  <text x="32" y="58" font-family="'Courier New', monospace" font-size="7.5" font-weight="bold" fill="#00ff9f" text-anchor="middle" letter-spacing="1" opacity="0.9">CybSS</text>
</svg>
