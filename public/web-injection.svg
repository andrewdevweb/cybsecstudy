<svg viewBox="0 0 900 520" xmlns="http://www.w3.org/2000/svg" font-family="'JetBrains Mono', monospace">
  <rect width="900" height="520" fill="#0a0a0f"/>
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(255,255,255,0.02)" stroke-width="1"/>
    </pattern>
    <marker id="arrow-orange" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#ff9f43"/>
    </marker>
    <marker id="arrow-red" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#ff6b6b"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#00ff9f"/>
    </marker>
  </defs>
  <rect width="900" height="520" fill="url(#grid)"/>

  <!-- ═══════════════════════════════════════════════
       STEP 1 — top left — browser with malicious input
  ═══════════════════════════════════════════════ -->

  <!-- step label -->
  <rect x="20" y="20" width="20" height="20" rx="3" fill="#4d96ff"/>
  <text x="30" y="34" text-anchor="middle" fill="#000" font-size="11" font-weight="700">1</text>
  <text x="48" y="34" fill="#e8eaf0" font-size="11" font-weight="700">Usuario introduce input</text>

  <!-- browser chrome -->
  <rect x="20" y="48" width="240" height="160" rx="6" fill="#12121a" stroke="#1e1e2e" stroke-width="1.5"/>
  <rect x="20" y="48" width="240" height="24" rx="6 6 0 0" fill="#1e1e2e"/>
  <circle cx="36" cy="60" r="4" fill="#ff6b6b"/>
  <circle cx="50" cy="60" r="4" fill="#ffd93d"/>
  <circle cx="64" cy="60" r="4" fill="#6bcb77"/>
  <rect x="80" y="52" width="140" height="16" rx="8" fill="#0a0a0f"/>
  <text x="150" y="63" text-anchor="middle" fill="#3a3a5a" font-size="8">tryhackme.com/hello</text>

  <!-- form inside browser -->
  <text x="140" y="100" text-anchor="middle" fill="#6b6b8a" font-size="10">¿Cómo te llamas?</text>
  <rect x="36" y="108" width="208" height="28" rx="4" fill="#0d0d18" stroke="#2a2a3a" stroke-width="1"/>
  <!-- malicious input highlighted -->
  <rect x="38" y="110" width="204" height="24" rx="3" fill="rgba(255,107,107,0.08)"/>
  <text x="46" y="126" fill="#ff6b6b" font-size="11" font-weight="700">&lt;h1&gt;Hackeado&lt;/h1&gt;</text>

  <rect x="36" y="148" width="208" height="28" rx="4" fill="#4d96ff" opacity="0.2" stroke="#4d96ff" stroke-width="1"/>
  <text x="140" y="167" text-anchor="middle" fill="#4d96ff" font-size="12" font-weight="700">Say Hi</text>

  <!-- "malicious input" tag -->
  <rect x="36" y="188" width="208" height="14" rx="3" fill="rgba(255,107,107,0.12)" stroke="#ff6b6b" stroke-width="1"/>
  <text x="140" y="198" text-anchor="middle" fill="#ff6b6b" font-size="8" letter-spacing="1">INPUT SIN SANITIZAR</text>

  <!-- arrow down -->
  <line x1="140" y1="218" x2="140" y2="258" stroke="#ff9f43" stroke-width="2" stroke-dasharray="4,3" marker-end="url(#arrow-orange)"/>
  <rect x="80" y="224" width="120" height="16" rx="3" fill="#0a0a0f"/>
  <text x="140" y="235" text-anchor="middle" fill="#ff9f43" font-size="9">pasado a JS sin filtrar</text>


  <!-- ═══════════════════════════════════════════════
       STEP 2 — bottom left — vulnerable JS function
  ═══════════════════════════════════════════════ -->

  <rect x="20" y="268" width="20" height="20" rx="3" fill="#ffd93d"/>
  <text x="30" y="282" text-anchor="middle" fill="#000" font-size="11" font-weight="700">2</text>
  <text x="48" y="282" fill="#e8eaf0" font-size="11" font-weight="700">Función JavaScript vulnerable</text>

  <!-- code block -->
  <rect x="20" y="294" width="380" height="130" rx="6" fill="#0d0d18" stroke="#ffd93d" stroke-width="1.5"/>
  <!-- line numbers bg -->
  <rect x="20" y="294" width="32" height="130" rx="6 0 0 6" fill="#0a0a0f"/>
  <text x="36" y="318" text-anchor="middle" fill="#3a3a5a" font-size="10">1</text>
  <text x="36" y="340" text-anchor="middle" fill="#3a3a5a" font-size="10">2</text>
  <text x="36" y="362" text-anchor="middle" fill="#3a3a5a" font-size="10">3</text>
  <text x="36" y="384" text-anchor="middle" fill="#3a3a5a" font-size="10">4</text>
  <text x="36" y="406" text-anchor="middle" fill="#3a3a5a" font-size="10">5</text>

  <text x="60" y="318" fill="#4d96ff" font-size="11">function <tspan fill="#6bcb77">sayHi</tspan>() &#123;</text>
  <text x="76" y="340" fill="#6b6b8a" font-size="11">const <tspan fill="#b0b0c8">name</tspan> = getElementById(<tspan fill="#ff9f43">'name'</tspan>).value;</text>
  <!-- highlighted vulnerable line -->
  <rect x="52" y="348" width="340" height="22" rx="2" fill="rgba(255,107,107,0.08)"/>
  <text x="76" y="362" fill="#b0b0c8" font-size="11">getElementById(<tspan fill="#ff9f43">"demo"</tspan>).<tspan fill="#ff6b6b" font-weight="700">innerHTML</tspan></text>
  <text x="76" y="384" fill="#b0b0c8" font-size="11">  = <tspan fill="#6bcb77">"Welcome "</tspan> + <tspan fill="#b0b0c8">name</tspan>;</text>
  <text x="60" y="406" fill="#4d96ff" font-size="11">&#125;</text>

  <!-- vulnerable badge — bottom right corner of code block, no overlap -->
  <rect x="296" y="370" width="96" height="20" rx="3" fill="rgba(255,107,107,0.15)" stroke="#ff6b6b" stroke-width="1"/>
  <text x="344" y="383" text-anchor="middle" fill="#ff6b6b" font-size="8" font-weight="700">⚠ VULNERABLE</text>


  <!-- ═══════════════════════════════════════════════
       CENTER ARROW right
  ═══════════════════════════════════════════════ -->

  <line x1="410" y1="340" x2="470" y2="340" stroke="#ff6b6b" stroke-width="2" marker-end="url(#arrow-red)"/>
  <rect x="408" y="310" width="64" height="22" rx="3" fill="#0a0a0f"/>
  <text x="440" y="325" text-anchor="middle" fill="#ff6b6b" font-size="9" font-weight="700">inyecta</text>
  <text x="440" y="338" text-anchor="middle" fill="#ff6b6b" font-size="9" font-weight="700">HTML</text>


  <!-- ═══════════════════════════════════════════════
       STEP 3 — top right — browser showing injected H1
  ═══════════════════════════════════════════════ -->

  <rect x="490" y="20" width="20" height="20" rx="3" fill="#ff6b6b"/>
  <text x="500" y="34" text-anchor="middle" fill="#fff" font-size="11" font-weight="700">3</text>
  <text x="518" y="34" fill="#e8eaf0" font-size="11" font-weight="700">Resultado en el navegador</text>

  <!-- browser chrome -->
  <rect x="490" y="48" width="390" height="200" rx="6" fill="#12121a" stroke="#ff6b6b" stroke-width="1.5"/>
  <rect x="490" y="48" width="390" height="24" rx="6 6 0 0" fill="#1e1e2e"/>
  <circle cx="506" cy="60" r="4" fill="#ff6b6b"/>
  <circle cx="520" cy="60" r="4" fill="#ffd93d"/>
  <circle cx="534" cy="60" r="4" fill="#6bcb77"/>
  <rect x="550" y="52" width="200" height="16" rx="8" fill="#0a0a0f"/>
  <text x="650" y="63" text-anchor="middle" fill="#3a3a5a" font-size="8">tryhackme.com/hello</text>

  <!-- injected H1 rendered -->
  <text x="685" y="118" text-anchor="middle" fill="#ff6b6b" font-size="36" font-weight="700">Hackeado</text>

  <!-- original form still there -->
  <rect x="506" y="140" width="358" height="28" rx="4" fill="#0d0d18" stroke="#2a2a3a" stroke-width="1"/>
  <text x="685" y="158" text-anchor="middle" fill="#6b6b8a" font-size="11">¿Cómo te llamas?</text>
  <rect x="506" y="176" width="358" height="28" rx="4" fill="#4d96ff" opacity="0.15" stroke="#4d96ff" stroke-width="1"/>
  <text x="685" y="195" text-anchor="middle" fill="#4d96ff" font-size="12" font-weight="700">Say Hi</text>

  <!-- annotation -->
  <rect x="506" y="226" width="358" height="16" rx="3" fill="rgba(255,107,107,0.1)" stroke="#ff6b6b" stroke-width="1"/>
  <text x="685" y="237" text-anchor="middle" fill="#ff6b6b" font-size="8" letter-spacing="1">EL NAVEGADOR RENDERIZA EL HTML INYECTADO COMO CÓDIGO REAL</text>


  <!-- ═══════════════════════════════════════════════
       STEP 4 — bottom right — fix
  ═══════════════════════════════════════════════ -->

  <rect x="490" y="268" width="20" height="20" rx="3" fill="#00ff9f"/>
  <text x="500" y="282" text-anchor="middle" fill="#000" font-size="11" font-weight="700">4</text>
  <text x="518" y="282" fill="#e8eaf0" font-size="11" font-weight="700">Solución — sanitizar el input</text>

  <rect x="490" y="294" width="390" height="170" rx="6" fill="#0d0d18" stroke="#00ff9f" stroke-width="1.5"/>

  <!-- vulnerable -->
  <rect x="490" y="294" width="390" height="70" rx="6 6 0 0" fill="rgba(255,107,107,0.05)"/>
  <rect x="490" y="294" width="4" height="70" rx="3 0 0 0" fill="#ff6b6b"/>
  <text x="506" y="316" fill="#ff6b6b" font-size="10" font-weight="700">VULNERABLE</text>
  <text x="506" y="334" fill="#6b6b8a" font-size="10">element.<tspan fill="#ff6b6b">innerHTML</tspan> = "Welcome " + userInput</text>
  <text x="506" y="352" fill="#3a3a5a" font-size="9">→ interpreta etiquetas HTML — el usuario puede inyectar código</text>

  <line x1="494" y1="366" x2="874" y2="366" stroke="#1e1e2e" stroke-width="1"/>

  <!-- safe -->
  <rect x="490" y="366" width="390" height="70" rx="0 0 6 6" fill="rgba(0,255,159,0.03)"/>
  <rect x="490" y="366" width="4" height="70" rx="0 0 0 3" fill="#00ff9f"/>
  <text x="506" y="388" fill="#00ff9f" font-size="10" font-weight="700">SEGURO</text>
  <text x="506" y="406" fill="#6b6b8a" font-size="10">element.<tspan fill="#00ff9f">textContent</tspan> = "Welcome " + userInput</text>
  <text x="506" y="424" fill="#3a3a5a" font-size="9">→ trata el input como texto plano — las etiquetas no se interpretan</text>

  <!-- rule of thumb -->
  <rect x="490" y="438" width="390" height="26" rx="0 0 6 6" fill="#12121a"/>
  <text x="685" y="455" text-anchor="middle" fill="#6b6b8a" font-size="9" letter-spacing="1">REGLA DE ORO — NUNCA CONFÍES EN EL INPUT DEL USUARIO</text>

</svg>
