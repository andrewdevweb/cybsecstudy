<svg viewBox="0 0 1020 510" xmlns="http://www.w3.org/2000/svg" font-family="'JetBrains Mono', monospace">
  <rect width="1020" height="510" fill="#0a0a0f"/>
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(0,255,159,0.03)" stroke-width="1"/>
    </pattern>
    <radialGradient id="glow" cx="75%" cy="30%" r="40%">
      <stop offset="0%" stop-color="rgba(0,255,159,0.05)"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0)"/>
    </radialGradient>
  </defs>
  <rect width="1020" height="510" fill="url(#grid)"/>
  <rect width="1020" height="510" fill="url(#glow)"/>

  <!-- TOP LEFT: title block -->
  <text x="48" y="72" fill="#1a1a2a" font-size="90" font-weight="700">HTTP</text>
  <text x="46" y="70" fill="#e8eaf0" font-size="90" font-weight="700">HTTP</text>
  <text x="48" y="92" fill="#00ff9f" font-size="10" letter-spacing="4">HYPERTEXT TRANSFER PROTOCOL</text>
  <line x1="48" y1="102" x2="360" y2="102" stroke="#1e1e2e" stroke-width="1"/>

  <!-- URL anatomy — below title, left column -->
  <text x="48" y="126" fill="#6b6b8a" font-size="9" letter-spacing="2">// URL ANATOMY</text>
  <text x="48" y="148" fill="#333" font-size="11">http://user@tryhackme.com:80/path?id=1#frag</text>

  <!-- colored segment boxes -->
  <!-- http -->
  <rect x="48" y="158" width="36" height="20" fill="rgba(0,255,159,0.1)" stroke="#00ff9f" stroke-width="1"/>
  <text x="66" y="172" text-anchor="middle" fill="#00ff9f" font-size="10">http</text>
  <!-- :// -->
  <text x="88" y="172" fill="#2a2a3a" font-size="10">://</text>
  <!-- user -->
  <rect x="104" y="158" width="34" height="20" fill="rgba(77,150,255,0.1)" stroke="#4d96ff" stroke-width="1"/>
  <text x="121" y="172" text-anchor="middle" fill="#4d96ff" font-size="10">user</text>
  <!-- @ -->
  <text x="141" y="172" fill="#2a2a3a" font-size="10">@</text>
  <!-- tryhackme.com -->
  <rect x="152" y="158" width="112" height="20" fill="rgba(255,159,67,0.1)" stroke="#ff9f43" stroke-width="1"/>
  <text x="208" y="172" text-anchor="middle" fill="#ff9f43" font-size="10">tryhackme.com</text>
  <!-- : -->
  <text x="267" y="172" fill="#2a2a3a" font-size="10">:</text>
  <!-- 80 -->
  <rect x="276" y="158" width="26" height="20" fill="rgba(255,107,157,0.1)" stroke="#ff6b9d" stroke-width="1"/>
  <text x="289" y="172" text-anchor="middle" fill="#ff6b9d" font-size="10">80</text>
  <!-- /path -->
  <rect x="306" y="158" width="44" height="20" fill="rgba(107,203,119,0.1)" stroke="#6bcb77" stroke-width="1"/>
  <text x="328" y="172" text-anchor="middle" fill="#6bcb77" font-size="10">/path</text>
  <!-- ?id=1 -->
  <rect x="354" y="158" width="48" height="20" fill="rgba(255,217,61,0.1)" stroke="#ffd93d" stroke-width="1"/>
  <text x="378" y="172" text-anchor="middle" fill="#ffd93d" font-size="10">?id=1</text>
  <!-- #frag -->
  <rect x="406" y="158" width="46" height="20" fill="rgba(199,125,255,0.1)" stroke="#c77dff" stroke-width="1"/>
  <text x="429" y="172" text-anchor="middle" fill="#c77dff" font-size="10">#frag</text>

  <!-- labels -->
  <text x="66"  y="192" text-anchor="middle" fill="#00ff9f" font-size="8">esquema</text>
  <text x="121" y="192" text-anchor="middle" fill="#4d96ff" font-size="8">usuario</text>
  <text x="208" y="192" text-anchor="middle" fill="#ff9f43" font-size="8">host</text>
  <text x="289" y="192" text-anchor="middle" fill="#ff6b9d" font-size="8">puerto</text>
  <text x="328" y="192" text-anchor="middle" fill="#6bcb77" font-size="8">ruta</text>
  <text x="378" y="192" text-anchor="middle" fill="#ffd93d" font-size="8">query</text>
  <text x="429" y="192" text-anchor="middle" fill="#c77dff" font-size="8">fragmento</text>

  <!-- METHODS — left bottom -->
  <text x="48" y="228" fill="#6b6b8a" font-size="9" letter-spacing="2">// MÉTODOS</text>
  <rect x="48"  y="238" width="64" height="26" fill="rgba(0,255,159,0.1)" stroke="#00ff9f" stroke-width="1"/>
  <text x="80"  y="255" text-anchor="middle" fill="#00ff9f" font-size="12" font-weight="700">GET</text>
  <rect x="118" y="238" width="64" height="26" fill="rgba(77,150,255,0.1)" stroke="#4d96ff" stroke-width="1"/>
  <text x="150" y="255" text-anchor="middle" fill="#4d96ff" font-size="12" font-weight="700">POST</text>
  <rect x="188" y="238" width="64" height="26" fill="rgba(255,159,67,0.1)" stroke="#ff9f43" stroke-width="1"/>
  <text x="220" y="255" text-anchor="middle" fill="#ff9f43" font-size="12" font-weight="700">PUT</text>
  <rect x="258" y="238" width="80" height="26" fill="rgba(255,107,107,0.1)" stroke="#ff6b6b" stroke-width="1"/>
  <text x="298" y="255" text-anchor="middle" fill="#ff6b6b" font-size="12" font-weight="700">DELETE</text>

  <!-- STATUS CODES — left bottom -->
  <text x="48" y="292" fill="#6b6b8a" font-size="9" letter-spacing="2">// STATUS CODES</text>
  <rect x="48"  y="302" width="52" height="40" rx="1" fill="#12121a" stroke="#6b6b8a" stroke-width="1"/>
  <text x="74"  y="320" text-anchor="middle" fill="#6b6b8a" font-size="14" font-weight="700">1xx</text>
  <text x="74"  y="334" text-anchor="middle" fill="#555" font-size="8">info</text>

  <rect x="106" y="302" width="52" height="40" rx="1" fill="#12121a" stroke="#00ff9f" stroke-width="1"/>
  <text x="132" y="320" text-anchor="middle" fill="#00ff9f" font-size="14" font-weight="700">2xx</text>
  <text x="132" y="334" text-anchor="middle" fill="#555" font-size="8">éxito</text>

  <rect x="164" y="302" width="52" height="40" rx="1" fill="#12121a" stroke="#4d96ff" stroke-width="1"/>
  <text x="190" y="320" text-anchor="middle" fill="#4d96ff" font-size="14" font-weight="700">3xx</text>
  <text x="190" y="334" text-anchor="middle" fill="#555" font-size="8">redirect</text>

  <rect x="222" y="302" width="52" height="40" rx="1" fill="#12121a" stroke="#ffd93d" stroke-width="1"/>
  <text x="248" y="320" text-anchor="middle" fill="#ffd93d" font-size="14" font-weight="700">4xx</text>
  <text x="248" y="334" text-anchor="middle" fill="#555" font-size="8">cliente</text>

  <rect x="280" y="302" width="52" height="40" rx="1" fill="#12121a" stroke="#ff6b6b" stroke-width="1"/>
  <text x="306" y="320" text-anchor="middle" fill="#ff6b6b" font-size="14" font-weight="700">5xx</text>
  <text x="306" y="334" text-anchor="middle" fill="#555" font-size="8">servidor</text>

  <!-- HTTPS badge — bottom left -->
  <rect x="48" y="360" width="180" height="50" rx="1" fill="#12121a" stroke="#00ff9f" stroke-width="1"/>
  <rect x="48" y="360" width="4" height="50" fill="#00ff9f"/>
  <text x="64" y="382" fill="#00ff9f" font-size="14" font-weight="700">HTTPS</text>
  <text x="64" y="398" fill="#6b6b8a" font-size="9">cifrado TLS · puerto 443</text>

  <!-- COOKIES badge -->
  <rect x="240" y="360" width="140" height="50" rx="1" fill="#12121a" stroke="#ffd93d" stroke-width="1"/>
  <rect x="240" y="360" width="4" height="50" fill="#ffd93d"/>
  <text x="256" y="382" fill="#ffd93d" font-size="14" font-weight="700">COOKIES</text>
  <text x="256" y="398" fill="#6b6b8a" font-size="9">estado · sesión · auth</text>

  <!-- RIGHT: request/response blocks -->
  <line x1="480" y1="40" x2="480" y2="470" stroke="#1e1e2e" stroke-width="1"/>

  <!-- REQUEST -->
  <text x="510" y="62" fill="#6b6b8a" font-size="9" letter-spacing="2">// REQUEST</text>
  <rect x="510" y="72" width="230" height="130" rx="1" fill="#12121a" stroke="#1e1e2e" stroke-width="1"/>
  <rect x="510" y="72" width="3" height="130" fill="#00ff9f"/>
  <text x="524" y="92"  fill="#00ff9f" font-size="11" font-weight="700">GET / HTTP/1.1</text>
  <text x="524" y="110" fill="#4d96ff" font-size="10">Host: <tspan fill="#b0b0c8">tryhackme.com</tspan></text>
  <text x="524" y="126" fill="#4d96ff" font-size="10">User-Agent: <tspan fill="#b0b0c8">Firefox/87.0</tspan></text>
  <text x="524" y="142" fill="#4d96ff" font-size="10">Referer: <tspan fill="#b0b0c8">https://tryhackme.com</tspan></text>
  <text x="524" y="158" fill="#4d96ff" font-size="10">Cookie: <tspan fill="#b0b0c8">session=abc123</tspan></text>
  <text x="524" y="174" fill="#3a3a5a" font-size="10">[blank line]</text>
  <text x="524" y="190" fill="#3a3a5a" font-size="10">[body — solo en POST/PUT]</text>

  <!-- arrow -->
  <line x1="750" y1="137" x2="830" y2="137" stroke="#00ff9f" stroke-width="1.5" marker-end="url(#ga)"/>
  <text x="790" y="130" text-anchor="middle" fill="#00ff9f" font-size="8">request →</text>
  <line x1="830" y1="152" x2="750" y2="152" stroke="#4d96ff" stroke-width="1.5" marker-end="url(#ba)"/>
  <text x="790" y="166" text-anchor="middle" fill="#4d96ff" font-size="8">← response</text>

  <!-- RESPONSE -->
  <text x="850" y="62" fill="#6b6b8a" font-size="9" letter-spacing="2">// RESPONSE</text>
  <rect x="850" y="72" width="148" height="130" rx="1" fill="#12121a" stroke="#1e1e2e" stroke-width="1"/>
  <rect x="850" y="72" width="3" height="130" fill="#4d96ff"/>
  <text x="864" y="92"  fill="#4d96ff" font-size="11" font-weight="700">HTTP/1.1 <tspan fill="#00ff9f">200 OK</tspan></text>
  <text x="864" y="110" fill="#4d96ff" font-size="10">Server: <tspan fill="#b0b0c8">nginx/1.15</tspan></text>
  <text x="864" y="126" fill="#4d96ff" font-size="10">Content-Type: <tspan fill="#b0b0c8">text/html</tspan></text>
  <text x="864" y="142" fill="#4d96ff" font-size="10">Set-Cookie: <tspan fill="#b0b0c8">sess=abc</tspan></text>
  <text x="864" y="158" fill="#3a3a5a" font-size="10">[blank line]</text>
  <text x="864" y="174" fill="#b0b0c8" font-size="10">&lt;html&gt;...&lt;/html&gt;</text>

  <!-- HEADERS section right -->
  <text x="510" y="232" fill="#6b6b8a" font-size="9" letter-spacing="2">// CABECERAS COMUNES</text>
  <!-- request headers -->
  <rect x="510" y="242" width="220" height="110" rx="1" fill="#12121a" stroke="#ff9f43" stroke-width="1"/>
  <text x="520" y="258" fill="#ff9f43" font-size="9" letter-spacing="1">REQUEST HEADERS</text>
  <text x="520" y="274" fill="#4d96ff" font-size="9">Host <tspan fill="#6b6b8a">— qué sitio quieres</tspan></text>
  <text x="520" y="288" fill="#4d96ff" font-size="9">User-Agent <tspan fill="#6b6b8a">— tu navegador</tspan></text>
  <text x="520" y="302" fill="#4d96ff" font-size="9">Accept-Encoding <tspan fill="#6b6b8a">— compresión</tspan></text>
  <text x="520" y="316" fill="#4d96ff" font-size="9">Cookie <tspan fill="#6b6b8a">— datos de sesión</tspan></text>
  <text x="520" y="330" fill="#4d96ff" font-size="9">Content-Length <tspan fill="#6b6b8a">— tamaño datos</tspan></text>

  <!-- response headers -->
  <rect x="742" y="242" width="226" height="110" rx="1" fill="#12121a" stroke="#c77dff" stroke-width="1"/>
  <text x="752" y="258" fill="#c77dff" font-size="9" letter-spacing="1">RESPONSE HEADERS</text>
  <text x="752" y="274" fill="#4d96ff" font-size="9">Set-Cookie <tspan fill="#6b6b8a">— guarda cookie</tspan></text>
  <text x="752" y="288" fill="#4d96ff" font-size="9">Cache-Control <tspan fill="#6b6b8a">— tiempo caché</tspan></text>
  <text x="752" y="302" fill="#4d96ff" font-size="9">Content-Type <tspan fill="#6b6b8a">— tipo de dato</tspan></text>
  <text x="752" y="316" fill="#4d96ff" font-size="9">Content-Encoding <tspan fill="#6b6b8a">— compresión</tspan></text>
  <text x="752" y="330" fill="#4d96ff" font-size="9">Server <tspan fill="#6b6b8a">— software servidor</tspan></text>

  <!-- COMMON CODES right bottom -->
  <text x="510" y="382" fill="#6b6b8a" font-size="9" letter-spacing="2">// CÓDIGOS FRECUENTES</text>
  <rect x="510" y="392" width="458" height="78" rx="1" fill="#12121a" stroke="#1e1e2e" stroke-width="1"/>
  <text x="530" y="412" fill="#00ff9f" font-size="11" font-weight="700">200</text><text x="530" y="426" fill="#6b6b8a" font-size="8">OK</text>
  <text x="586" y="412" fill="#00ff9f" font-size="11" font-weight="700">201</text><text x="586" y="426" fill="#6b6b8a" font-size="8">Created</text>
  <text x="648" y="412" fill="#4d96ff" font-size="11" font-weight="700">301</text><text x="648" y="426" fill="#6b6b8a" font-size="8">Moved</text>
  <text x="704" y="412" fill="#4d96ff" font-size="11" font-weight="700">302</text><text x="704" y="426" fill="#6b6b8a" font-size="8">Found</text>
  <text x="756" y="412" fill="#ffd93d" font-size="11" font-weight="700">401</text><text x="756" y="426" fill="#6b6b8a" font-size="8">Unauth</text>
  <text x="810" y="412" fill="#ffd93d" font-size="11" font-weight="700">403</text><text x="810" y="426" fill="#6b6b8a" font-size="8">Forbidden</text>
  <text x="866" y="412" fill="#ffd93d" font-size="11" font-weight="700">404</text><text x="866" y="426" fill="#6b6b8a" font-size="8">Not Found</text>
  <text x="922" y="412" fill="#ff6b6b" font-size="11" font-weight="700">500</text><text x="922" y="426" fill="#6b6b8a" font-size="8">Server Err</text>
  <!-- separator lines -->
  <line x1="576" y1="398" x2="576" y2="464" stroke="#1e1e2e" stroke-width="1"/>
  <line x1="638" y1="398" x2="638" y2="464" stroke="#1e1e2e" stroke-width="1"/>
  <line x1="696" y1="398" x2="696" y2="464" stroke="#1e1e2e" stroke-width="1"/>
  <line x1="748" y1="398" x2="748" y2="464" stroke="#1e1e2e" stroke-width="1"/>
  <line x1="804" y1="398" x2="804" y2="464" stroke="#1e1e2e" stroke-width="1"/>
  <line x1="858" y1="398" x2="858" y2="464" stroke="#1e1e2e" stroke-width="1"/>
  <line x1="914" y1="398" x2="914" y2="464" stroke="#1e1e2e" stroke-width="1"/>

  <defs>
    <marker id="ga" markerWidth="7" markerHeight="7" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L7,3 z" fill="#00ff9f"/>
    </marker>
    <marker id="ba" markerWidth="7" markerHeight="7" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L7,3 z" fill="#4d96ff"/>
    </marker>
  </defs>
</svg>
