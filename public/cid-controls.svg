<svg viewBox="0 0 700 220" xmlns="http://www.w3.org/2000/svg" font-family="'JetBrains Mono', monospace">
  <rect width="700" height="220" fill="#0a0a0f"/>
  <text x="24" y="28" fill="#6b6b8a" font-size="10" letter-spacing="2">// CONTROLES POR PILAR</text>

  <rect x="20" y="44" width="660" height="150" rx="4" fill="#12121a" stroke="#1e1e2e" stroke-width="1"/>

  <rect x="36" y="60" width="180" height="118" rx="3" fill="#0a0a0f" stroke="#ff6b6b" stroke-width="1.5"/>
  <text x="126" y="82" text-anchor="middle" fill="#ff6b6b" font-size="11" font-weight="700">CONFIDENCIALIDAD</text>
  <text x="50" y="108" fill="#6b6b8a" font-size="9">• cifrado</text>
  <text x="50" y="126" fill="#6b6b8a" font-size="9">• MFA</text>
  <text x="50" y="144" fill="#6b6b8a" font-size="9">• IAM y ACLs</text>
  <text x="50" y="162" fill="#6b6b8a" font-size="9">• minimo privilegio</text>

  <rect x="260" y="60" width="180" height="118" rx="3" fill="#0a0a0f" stroke="#4d96ff" stroke-width="1.5"/>
  <text x="350" y="82" text-anchor="middle" fill="#4d96ff" font-size="11" font-weight="700">INTEGRIDAD</text>
  <text x="274" y="108" fill="#6b6b8a" font-size="9">• hashes</text>
  <text x="274" y="126" fill="#6b6b8a" font-size="9">• firmas digitales</text>
  <text x="274" y="144" fill="#6b6b8a" font-size="9">• control de cambios</text>
  <text x="274" y="162" fill="#6b6b8a" font-size="9">• auditoria y trazabilidad</text>

  <rect x="484" y="60" width="180" height="118" rx="3" fill="#0a0a0f" stroke="#6bcb77" stroke-width="1.5"/>
  <text x="574" y="82" text-anchor="middle" fill="#6bcb77" font-size="11" font-weight="700">DISPONIBILIDAD</text>
  <text x="498" y="108" fill="#6b6b8a" font-size="9">• alta disponibilidad</text>
  <text x="498" y="126" fill="#6b6b8a" font-size="9">• backups</text>
  <text x="498" y="144" fill="#6b6b8a" font-size="9">• redundancia</text>
  <text x="498" y="162" fill="#6b6b8a" font-size="9">• balanceo y anti-DDoS</text>

  <text x="350" y="210" text-anchor="middle" fill="#3a3a5a" font-size="8">Los controles cambian, pero el mapa mental de CID sigue siendo util.</text>
</svg>
