<svg viewBox="0 0 700 200" xmlns="http://www.w3.org/2000/svg" font-family="'JetBrains Mono', monospace">
  <rect width="700" height="200" fill="#0a0a0f"/>
  <defs>
    <marker id="ga" markerWidth="7" markerHeight="7" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L7,3 z" fill="#00ff9f"/></marker>
  </defs>

  <!-- 5 device types across, with tradeoff axis below -->

  <!-- Portátil -->
  <rect x="10" y="20" width="110" height="90" rx="3" fill="#12121a" stroke="#00ff9f" stroke-width="1.5"/>
  <rect x="10" y="20" width="110" height="4" fill="#00ff9f"/>
  <text x="65" y="48" text-anchor="middle" fill="#00ff9f" font-size="11" font-weight="700">PORTÁTIL</text>
  <text x="65" y="65" text-anchor="middle" fill="#6b6b8a" font-size="9">movilidad ★★★★★</text>
  <text x="65" y="79" text-anchor="middle" fill="#6b6b8a" font-size="9">rendimiento ★★★☆☆</text>
  <text x="65" y="93" text-anchor="middle" fill="#6b6b8a" font-size="9">coste ★★★☆☆</text>

  <!-- Sobremesa -->
  <rect x="130" y="20" width="110" height="90" rx="3" fill="#12121a" stroke="#4d96ff" stroke-width="1.5"/>
  <rect x="130" y="20" width="110" height="4" fill="#4d96ff"/>
  <text x="185" y="48" text-anchor="middle" fill="#4d96ff" font-size="11" font-weight="700">SOBREMESA</text>
  <text x="185" y="65" text-anchor="middle" fill="#6b6b8a" font-size="9">movilidad ★☆☆☆☆</text>
  <text x="185" y="79" text-anchor="middle" fill="#6b6b8a" font-size="9">rendimiento ★★★★☆</text>
  <text x="185" y="93" text-anchor="middle" fill="#6b6b8a" font-size="9">coste ★★☆☆☆</text>

  <!-- Workstation -->
  <rect x="250" y="20" width="110" height="90" rx="3" fill="#12121a" stroke="#ff9f43" stroke-width="1.5"/>
  <rect x="250" y="20" width="110" height="4" fill="#ff9f43"/>
  <text x="305" y="48" text-anchor="middle" fill="#ff9f43" font-size="11" font-weight="700">WORKSTATION</text>
  <text x="305" y="65" text-anchor="middle" fill="#6b6b8a" font-size="9">movilidad ★☆☆☆☆</text>
  <text x="305" y="79" text-anchor="middle" fill="#6b6b8a" font-size="9">precisión ★★★★★</text>
  <text x="305" y="93" text-anchor="middle" fill="#6b6b8a" font-size="9">coste ★★★★☆</text>

  <!-- Servidor -->
  <rect x="370" y="20" width="110" height="90" rx="3" fill="#12121a" stroke="#ff6b6b" stroke-width="1.5"/>
  <rect x="370" y="20" width="110" height="4" fill="#ff6b6b"/>
  <text x="425" y="48" text-anchor="middle" fill="#ff6b6b" font-size="11" font-weight="700">SERVIDOR</text>
  <text x="425" y="65" text-anchor="middle" fill="#6b6b8a" font-size="9">movilidad ★☆☆☆☆</text>
  <text x="425" y="79" text-anchor="middle" fill="#6b6b8a" font-size="9">disponibilidad ★★★★★</text>
  <text x="425" y="93" text-anchor="middle" fill="#6b6b8a" font-size="9">coste ★★★★★</text>

  <!-- IoT -->
  <rect x="490" y="20" width="110" height="90" rx="3" fill="#12121a" stroke="#ffd93d" stroke-width="1.5"/>
  <rect x="490" y="20" width="110" height="4" fill="#ffd93d"/>
  <text x="545" y="48" text-anchor="middle" fill="#ffd93d" font-size="11" font-weight="700">IoT</text>
  <text x="545" y="65" text-anchor="middle" fill="#6b6b8a" font-size="9">coste ★☆☆☆☆</text>
  <text x="545" y="79" text-anchor="middle" fill="#6b6b8a" font-size="9">consumo ★☆☆☆☆</text>
  <text x="545" y="93" text-anchor="middle" fill="#ff6b6b" font-size="9">seguridad ★☆☆☆☆</text>

  <!-- tradeoff bar -->
  <text x="350" y="135" text-anchor="middle" fill="#6b6b8a" font-size="9" letter-spacing="2">// COMPROMISO FUNDAMENTAL</text>
  <line x1="10" y1="152" x2="690" y2="152" stroke="#1e1e2e" stroke-width="1"/>
  <line x1="10" y1="152" x2="690" y2="152" stroke="url(#grad)" stroke-width="3"/>
  <defs>
    <linearGradient id="grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00ff9f"/>
      <stop offset="100%" stop-color="#ff6b6b"/>
    </linearGradient>
  </defs>
  <text x="10"  y="170" fill="#00ff9f" font-size="9">← más portátil</text>
  <text x="690" y="170" text-anchor="end" fill="#ff6b6b" font-size="9">más potente →</text>
  <text x="350" y="188" text-anchor="middle" fill="#3a3a5a" font-size="8">no existe el ordenador perfecto — solo la herramienta adecuada</text>
</svg>
