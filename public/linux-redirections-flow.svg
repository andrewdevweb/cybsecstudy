<svg viewBox="0 0 980 460" xmlns="http://www.w3.org/2000/svg" font-family="'JetBrains Mono', monospace">
  <rect width="980" height="460" fill="#0a0a0f"/>
  <text x="40" y="42" fill="#e8eaf0" font-size="28" font-weight="700">FLUJO OPERATIVO</text>
  <text x="40" y="64" fill="#4d96ff" font-size="10" letter-spacing="3">QUE ENTRA, QUE SALE Y QUE SE SEPARA</text>
  <line x1="40" y1="78" x2="560" y2="78" stroke="#1e1e2e"/>

  <rect x="56" y="132" width="170" height="86" rx="8" fill="#12121a" stroke="#6bcb77"/>
  <text x="141" y="166" text-anchor="middle" fill="#6bcb77" font-size="13" font-weight="700">nombres.txt</text>
  <text x="141" y="189" text-anchor="middle" fill="#6b6b8a" font-size="10">entrada del comando</text>

  <rect x="404" y="112" width="180" height="126" rx="8" fill="#12121a" stroke="#1e1e2e"/>
  <text x="494" y="154" text-anchor="middle" fill="#e8eaf0" font-size="18" font-weight="700">sort</text>
  <text x="494" y="182" text-anchor="middle" fill="#6b6b8a" font-size="10">ordena datos y devuelve resultados</text>

  <rect x="740" y="104" width="178" height="86" rx="8" fill="#12121a" stroke="#ff9f43"/>
  <text x="829" y="138" text-anchor="middle" fill="#ff9f43" font-size="13" font-weight="700">ordenados.txt</text>
  <text x="829" y="161" text-anchor="middle" fill="#6b6b8a" font-size="10">recibe STDOUT con &gt;</text>

  <rect x="740" y="256" width="178" height="86" rx="8" fill="#12121a" stroke="#ff6b6b"/>
  <text x="829" y="290" text-anchor="middle" fill="#ff6b6b" font-size="13" font-weight="700">errores.log</text>
  <text x="829" y="313" text-anchor="middle" fill="#6b6b8a" font-size="10">recibe STDERR con 2&gt;</text>

  <path d="M 226 175 C 290 175, 328 175, 404 175" fill="none" stroke="#6bcb77" stroke-width="3"/>
  <polygon points="404,175 392,169 392,181" fill="#6bcb77"/>

  <path d="M 584 154 C 652 154, 680 147, 740 147" fill="none" stroke="#ff9f43" stroke-width="3"/>
  <polygon points="740,147 728,141 728,153" fill="#ff9f43"/>

  <path d="M 584 210 C 646 210, 678 299, 740 299" fill="none" stroke="#ff6b6b" stroke-width="3"/>
  <polygon points="740,299 728,293 728,305" fill="#ff6b6b"/>

  <text x="54" y="272" fill="#e8eaf0" font-size="12" font-weight="700">Ejemplo mental</text>
  <text x="54" y="298" fill="#6b6b8a" font-size="10">sort &lt; nombres.txt &gt; ordenados.txt 2&gt; errores.log</text>
  <text x="54" y="330" fill="#6b6b8a" font-size="10">la entrada viene del archivo</text>
  <text x="54" y="352" fill="#6b6b8a" font-size="10">la salida valida acaba en otro archivo</text>
  <text x="54" y="374" fill="#6b6b8a" font-size="10">los errores se guardan aparte para revisarlos despues</text>
</svg>
