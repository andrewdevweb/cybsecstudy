<svg viewBox="0 0 700 280" xmlns="http://www.w3.org/2000/svg" font-family="'JetBrains Mono', monospace">
  <rect width="700" height="280" fill="#0a0a0f"/>

  <!-- Comentario cabecera -->
  <text x="24" y="28" fill="#6b6b8a" font-size="10" letter-spacing="2">// CAPAS DE DEFENSA</text>

  <!-- Capa 1: exterior — Personas, políticas y gobierno -->
  <rect x="40" y="48" width="620" height="192" rx="80" fill="none" stroke="#ff6b6b" stroke-width="1.5"/>
  <text x="350" y="38" text-anchor="middle" fill="#ff6b6b" font-size="10" font-weight="700" letter-spacing="1.5">PERSONAS, POLÍTICAS Y GOBIERNO</text>
  <line x1="350" y1="41" x2="350" y2="48" stroke="#ff6b6b" stroke-width="1" opacity="0.5"/>

  <!-- Capa 2: media — Identidad, sistemas y red -->
  <rect x="108" y="88" width="484" height="112" rx="50" fill="none" stroke="#4d96ff" stroke-width="1.5"/>
  <text x="350" y="78" text-anchor="middle" fill="#4d96ff" font-size="10" font-weight="700" letter-spacing="1.5">IDENTIDAD, SISTEMAS Y RED</text>
  <line x1="350" y1="81" x2="350" y2="88" stroke="#4d96ff" stroke-width="1" opacity="0.5"/>

  <!-- Capa 3: núcleo — Apps, datos y operación -->
  <rect x="192" y="118" width="316" height="52" rx="26" fill="#12121a" stroke="#6bcb77" stroke-width="1.5"/>
  <text x="350" y="148" text-anchor="middle" dominant-baseline="central" fill="#6bcb77" font-size="10" font-weight="700" letter-spacing="1.5">APPS, DATOS Y OPERACIÓN</text>

  <!-- Nota al pie -->
  <text x="350" y="262" text-anchor="middle" fill="#3a3a5a" font-size="8">Profundidad significa superponer controles distintos para resistir mejor el fallo.</text>
</svg>
