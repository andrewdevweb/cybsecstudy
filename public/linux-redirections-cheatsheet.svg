  <!-- Card 3: < -->
  <rect x="492" y="100" width="222" height="172" rx="10" fill="#12121a" stroke="#6bcb77" style="fill:rgb(18, 18, 26);stroke:rgb(107, 203, 119);color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;JetBrains Mono&quot;, monospace;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <text x="518" y="138" fill="#6bcb77" font-size="20" font-weight="700" style="fill:rgb(107, 203, 119);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;JetBrains Mono&quot;, monospace;font-size:20px;font-weight:700;text-anchor:start;dominant-baseline:auto">&lt;</text>
