<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 310" font-family="'JetBrains Mono', monospace">
  <rect width="980" height="300" fill="#0a0a0f" style="fill:rgb(10, 10, 15);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;JetBrains Mono&quot;, monospace;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <text x="40" y="42" fill="#e8eaf0" font-size="28" font-weight="700" style="fill:rgb(232, 234, 240);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;JetBrains Mono&quot;, monospace;font-size:28px;font-weight:700;text-anchor:start;dominant-baseline:auto">CHULETA RAPIDA</text>
  <text x="40" y="64" fill="#ff9f43" font-size="10" letter-spacing="3" style="fill:rgb(255, 159, 67);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;JetBrains Mono&quot;, monospace;font-size:10px;font-weight:400;text-anchor:start;dominant-baseline:auto">LOS 4 OPERADORES QUE DEBES VISUALIZAR</text>
  <line x1="40" y1="78" x2="540" y2="78" stroke="#1e1e2e" style="fill:rgb(0, 0, 0);stroke:rgb(30, 30, 46);color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;JetBrains Mono&quot;, monospace;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <!-- Card 1: > -->
  <rect x="24" y="100" width="222" height="172" rx="10" fill="#12121a" stroke="#ff9f43" style="fill:rgb(18, 18, 26);stroke:rgb(255, 159, 67);color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;JetBrains Mono&quot;, monospace;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <text x="50" y="138" fill="#ff9f43" font-size="20" font-weight="700" style="fill:rgb(255, 159, 67);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;JetBrains Mono&quot;, monospace;font-size:20px;font-weight:700;text-anchor:start;dominant-baseline:auto">&gt;</text>
  <text x="50" y="166" fill="#e8eaf0" font-size="12" font-weight="700" style="fill:rgb(232, 234, 240);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;JetBrains Mono&quot;, monospace;font-size:12px;font-weight:700;text-anchor:start;dominant-baseline:auto">STDOUT a archivo</text>
  <text x="50" y="192" fill="#6b6b8a" font-size="10" style="fill:rgb(107, 107, 138);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;JetBrains Mono&quot;, monospace;font-size:10px;font-weight:400;text-anchor:start;dominant-baseline:auto">sobrescribe si ya existe</text>
  <text x="50" y="216" fill="#6b6b8a" font-size="10" style="fill:rgb(107, 107, 138);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;JetBrains Mono&quot;, monospace;font-size:10px;font-weight:400;text-anchor:start;dominant-baseline:auto">ejemplo: echo "ok" &gt; salida.txt</text>

  <!-- Card 2: >> -->
  <rect x="258" y="100" width="222" height="172" rx="10" fill="#12121a" stroke="#4d96ff" style="fill:rgb(18, 18, 26);stroke:rgb(77, 150, 255);color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;JetBrains Mono&quot;, monospace;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <text x="284" y="138" fill="#4d96ff" font-size="20" font-weight="700" style="fill:rgb(77, 150, 255);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;JetBrains Mono&quot;, monospace;font-size:20px;font-weight:700;text-anchor:start;dominant-baseline:auto">&gt;&gt;</text>
