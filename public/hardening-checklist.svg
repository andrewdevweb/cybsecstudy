<svg viewBox="0 0 700 250" xmlns="http://www.w3.org/2000/svg" font-family="'JetBrains Mono', monospace">
  <rect width="700" height="250" fill="#0a0a0f"/>
  <text x="24" y="28" fill="#6b6b8a" font-size="10" letter-spacing="2">// CHECKLIST DE ENDURECIMIENTO</text>

  <rect x="20" y="50" width="660" height="172" rx="4" fill="#12121a" stroke="#1e1e2e"/>
  <text x="44" y="84" fill="#ff6b6b" font-size="10">[ ]</text><text x="76" y="84" fill="#e8eaf0" font-size="10">Eliminar servicios no usados</text>
  <text x="44" y="110" fill="#4d96ff" font-size="10">[ ]</text><text x="76" y="110" fill="#e8eaf0" font-size="10">Cerrar puertos innecesarios</text>
  <text x="44" y="136" fill="#6bcb77" font-size="10">[ ]</text><text x="76" y="136" fill="#e8eaf0" font-size="10">Reforzar autenticacion administrativa</text>
  <text x="44" y="162" fill="#ffd93d" font-size="10">[ ]</text><text x="76" y="162" fill="#e8eaf0" font-size="10">Desactivar protocolos o features legacy</text>
