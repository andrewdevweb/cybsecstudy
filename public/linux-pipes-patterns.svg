<svg viewBox="0 0 980 380" xmlns="http://www.w3.org/2000/svg" font-family="'JetBrains Mono', monospace">
  <rect width="980" height="380" fill="#0a0a0f"/>
  <text x="40" y="42" fill="#e8eaf0" font-size="28" font-weight="700">PATRONES DE USO</text>
  <text x="40" y="64" fill="#4d96ff" font-size="10" letter-spacing="3">FILTRAR · CONTAR · PAGINAR · REDUCIR RUIDO</text>
  <line x1="40" y1="78" x2="560" y2="78" stroke="#1e1e2e"/>

  <rect x="52" y="120" width="270" height="78" rx="10" fill="#12121a" stroke="#ff9f43"/>
  <text x="74" y="151" fill="#ff9f43" font-size="12" font-weight="700">ps aux | grep ssh</text>
  <text x="74" y="174" fill="#6b6b8a" font-size="10">lista procesos y filtra coincidencias</text>

  <rect x="352" y="120" width="270" height="78" rx="10" fill="#12121a" stroke="#6bcb77"/>
  <text x="374" y="151" fill="#6bcb77" font-size="12" font-weight="700">cat access.log | grep 500 | wc -l</text>
  <text x="374" y="174" fill="#6b6b8a" font-size="10">cuenta lineas que cumplen una condicion</text>

  <rect x="652" y="120" width="270" height="78" rx="10" fill="#12121a" stroke="#c77dff"/>
  <text x="674" y="151" fill="#c77dff" font-size="12" font-weight="700">ls /var/log | less</text>
  <text x="674" y="174" fill="#6b6b8a" font-size="10">permite revisar una salida larga con control</text>

  <rect x="52" y="228" width="270" height="78" rx="10" fill="#12121a" stroke="#4d96ff"/>
  <text x="74" y="259" fill="#4d96ff" font-size="12" font-weight="700">history | tail</text>
  <text x="74" y="282" fill="#6b6b8a" font-size="10">te quedas con el final del historial</text>

  <rect x="352" y="228" width="270" height="78" rx="10" fill="#12121a" stroke="#ffd93d"/>
  <text x="374" y="259" fill="#ffd93d" font-size="12" font-weight="700">dmesg | tail</text>
  <text x="374" y="282" fill="#6b6b8a" font-size="10">muestra el tramo mas reciente de una salida grande</text>

  <rect x="652" y="228" width="270" height="78" rx="10" fill="#12121a" stroke="#ff6b6b"/>
  <text x="674" y="259" fill="#ff6b6b" font-size="12" font-weight="700">cat auth.log | grep failed</text>
  <text x="674" y="282" fill="#6b6b8a" font-size="10">reduce ruido y centra la atencion en eventos concretos</text>
</svg>
