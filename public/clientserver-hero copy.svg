<svg viewBox="0 0 1020 510" xmlns="http://www.w3.org/2000/svg" font-family="'JetBrains Mono', monospace">
  <rect width="1020" height="510" fill="#0a0a0f"/>
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(0,255,159,0.03)" stroke-width="1"/>
    </pattern>
    <marker id="ga" markerWidth="7" markerHeight="7" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L7,3 z" fill="#00ff9f"/></marker>
    <marker id="ba" markerWidth="7" markerHeight="7" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L7,3 z" fill="#4d96ff"/></marker>
  </defs>
  <rect width="1020" height="510" fill="url(#grid)"/>

  <!-- TITLE -->
  <text x="48" y="56" fill="#1a1a2a" font-size="44" font-weight="700">CLIENTE-SERVIDOR</text>
  <text x="46" y="54" fill="#e8eaf0" font-size="44" font-weight="700">CLIENTE-SERVIDOR</text>
  <text x="48" y="74" fill="#00ff9f" font-size="10" letter-spacing="4">CONCEPTOS BÁSICOS DE RED</text>
  <line x1="48" y1="84" x2="420" y2="84" stroke="#1e1e2e" stroke-width="1"/>

  <!-- LEFT: client-server flow -->
  <text x="48" y="104" fill="#6b6b8a" font-size="9" letter-spacing="2">// MODELO CLIENTE-SERVIDOR</text>

  <!-- CLIENT box -->
  <rect x="48" y="114" width="150" height="80" rx="3" fill="#12121a" stroke="#00ff9f" stroke-width="1.5"/>
  <rect x="48" y="114" width="150" height="4" fill="#00ff9f"/>
  <rect x="72" y="128" width="102" height="50" rx="2" fill="#0a0a0f" stroke="#00ff9f" stroke-width="1"/>
  <rect x="72" y="128" width="102" height="12" rx="2 2 0 0" fill="#1e1e2e"/>
  <circle cx="80" cy="134" r="2" fill="#ff6b6b"/>
  <circle cx="88" cy="134" r="2" fill="#ffd93d"/>
  <circle cx="96" cy="134" r="2" fill="#6bcb77"/>
  <rect x="78" y="146" width="88" height="5" rx="1" fill="#00ff9f" opacity="0.12"/>
  <rect x="78" y="155" width="60" height="4" rx="1" fill="#1e1e2e"/>
  <text x="123" y="208" text-anchor="middle" fill="#00ff9f" font-size="11" font-weight="700">CLIENTE</text>
  <text x="123" y="222" text-anchor="middle" fill="#6b6b8a" font-size="9">navegador · app</text>

  <!-- SERVER box — moved right for space -->
  <rect x="280" y="114" width="150" height="80" rx="3" fill="#12121a" stroke="#4d96ff" stroke-width="1.5"/>
  <rect x="280" y="114" width="150" height="4" fill="#4d96ff"/>
  <rect x="298" y="128" width="114" height="12" rx="1" fill="#0a0a0f" stroke="#4d96ff" stroke-width="0.5" opacity="0.6"/>
  <circle cx="404" cy="134" r="3" fill="#4d96ff"/>
  <rect x="298" y="144" width="114" height="12" rx="1" fill="#0a0a0f" stroke="#4d96ff" stroke-width="0.5" opacity="0.5"/>
  <circle cx="404" cy="150" r="3" fill="#4d96ff" opacity="0.6"/>
  <rect x="298" y="160" width="114" height="12" rx="1" fill="#0a0a0f" stroke="#4d96ff" stroke-width="0.5" opacity="0.4"/>
  <text x="355" y="208" text-anchor="middle" fill="#4d96ff" font-size="11" font-weight="700">SERVIDOR</text>
  <text x="355" y="222" text-anchor="middle" fill="#6b6b8a" font-size="9">escucha · procesa</text>

  <!-- request arrow -->
  <text x="240" y="122" text-anchor="middle" fill="#00ff9f" font-size="9" font-weight="700">REQUEST</text>
  <text x="240" y="133" text-anchor="middle" fill="#3a3a5a" font-size="7">GET /index.html</text>
  <text x="240" y="143" text-anchor="middle" fill="#3a3a5a" font-size="7">HTTP/1.1</text>
  <line x1="202" y1="150" x2="278" y2="150" stroke="#00ff9f" stroke-width="1.5" marker-end="url(#ga)"/>

  <!-- response arrow -->
  <line x1="278" y1="168" x2="202" y2="168" stroke="#4d96ff" stroke-width="1.5" marker-end="url(#ba)"/>
  <text x="240" y="180" text-anchor="middle" fill="#4d96ff" font-size="9" font-weight="700">RESPONSE</text>
  <text x="240" y="191" text-anchor="middle" fill="#3a3a5a" font-size="7">200 OK + HTML</text>

  <!-- DNS -->
  <text x="48" y="270" fill="#6b6b8a" font-size="9" letter-spacing="2">// DNS — TRADUCCIÓN DE NOMBRES</text>
  <rect x="48" y="280" width="346" height="52" rx="2" fill="#12121a" stroke="#ffd93d" stroke-width="1"/>
  <text x="62" y="300" fill="#ffd93d" font-size="11" font-weight="700">tryhackme.com</text>
  <line x1="190" y1="306" x2="220" y2="306" stroke="#ffd93d" stroke-width="1.5" marker-end="url(#ya)"/>
  <text x="205" y="299" text-anchor="middle" fill="#6b6b8a" font-size="8">DNS</text>
  <text x="250" y="300" fill="#00ff9f" font-size="11" font-weight="700">104.26.10.229</text>
  <text x="62" y="320" fill="#6b6b8a" font-size="9">nombre de dominio → dirección IP del servidor</text>
  <defs>
    <marker id="ya" markerWidth="7" markerHeight="7" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L7,3 z" fill="#ffd93d"/></marker>
    <marker id="ra" markerWidth="7" markerHeight="7" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L7,3 z" fill="#ff6b6b"/></marker>
  </defs>

  <!-- PORTS -->
  <text x="48" y="356" fill="#6b6b8a" font-size="9" letter-spacing="2">// PUERTOS — PUERTAS DE ACCESO</text>
  <rect x="48"  y="366" width="80" height="52" rx="2" fill="#12121a" stroke="#00ff9f" stroke-width="1"/>
  <text x="88" y="386" text-anchor="middle" fill="#00ff9f" font-size="10" font-weight="700">:80</text>
  <text x="88" y="402" text-anchor="middle" fill="#6b6b8a" font-size="8">HTTP</text>
  <text x="88" y="413" text-anchor="middle" fill="#3a3a5a" font-size="8">web</text>

  <rect x="136" y="366" width="80" height="52" rx="2" fill="#12121a" stroke="#00ff9f" stroke-width="1"/>
  <text x="176" y="386" text-anchor="middle" fill="#00ff9f" font-size="10" font-weight="700">:443</text>
  <text x="176" y="402" text-anchor="middle" fill="#6b6b8a" font-size="8">HTTPS</text>
  <text x="176" y="413" text-anchor="middle" fill="#3a3a5a" font-size="8">web cifrada</text>

  <rect x="224" y="366" width="80" height="52" rx="2" fill="#12121a" stroke="#ff9f43" stroke-width="1"/>
  <text x="264" y="386" text-anchor="middle" fill="#ff9f43" font-size="10" font-weight="700">:22</text>
  <text x="264" y="402" text-anchor="middle" fill="#6b6b8a" font-size="8">SSH</text>
  <text x="264" y="413" text-anchor="middle" fill="#3a3a5a" font-size="8">acceso remoto</text>

  <rect x="312" y="366" width="80" height="52" rx="2" fill="#12121a" stroke="#ff6b6b" stroke-width="1"/>
  <text x="352" y="386" text-anchor="middle" fill="#ff6b6b" font-size="10" font-weight="700">:53</text>
  <text x="352" y="402" text-anchor="middle" fill="#6b6b8a" font-size="8">DNS</text>
  <text x="352" y="413" text-anchor="middle" fill="#3a3a5a" font-size="8">resolución</text>

  <!-- PROTOCOL -->
  <text x="48" y="442" fill="#6b6b8a" font-size="9" letter-spacing="2">// PROTOCOLO — REGLAS DE COMUNICACIÓN</text>
  <rect x="48" y="452" width="346" height="44" rx="2" fill="#12121a" stroke="#c77dff" stroke-width="1"/>
  <rect x="48" y="452" width="4" height="44" fill="#c77dff"/>
  <text x="62" y="469" fill="#c77dff" font-size="10" font-weight="700">HTTP</text>
  <text x="104" y="469" fill="#6b6b8a" font-size="9">— comandos (GET, POST...) · estructura · sintaxis</text>
  <text x="62" y="485" fill="#c77dff" font-size="10" font-weight="700">HTTPS</text>
  <text x="110" y="485" fill="#6b6b8a" font-size="9">— HTTP + TLS · cifrado extremo a extremo</text>

  <!-- RIGHT divider -->
  <line x1="430" y1="30" x2="430" y2="490" stroke="#1e1e2e" stroke-width="1"/>

  <!-- RIGHT: HTTP methods -->
  <text x="456" y="48" fill="#6b6b8a" font-size="9" letter-spacing="2">// MÉTODOS HTTP</text>
  <rect x="456" y="58" width="540" height="200" rx="2" fill="#12121a" stroke="#1e1e2e" stroke-width="1"/>

  <!-- method rows -->
  <rect x="464" y="66" width="70" height="22" rx="2" fill="rgba(0,255,159,0.1)" stroke="#00ff9f" stroke-width="1"/>
  <text x="499" y="81" text-anchor="middle" fill="#00ff9f" font-size="11" font-weight="700">GET</text>
  <text x="544" y="81" fill="#6b6b8a" font-size="10">Obtener un recurso del servidor</text>

  <rect x="464" y="96" width="70" height="22" rx="2" fill="rgba(77,150,255,0.1)" stroke="#4d96ff" stroke-width="1"/>
  <text x="499" y="111" text-anchor="middle" fill="#4d96ff" font-size="11" font-weight="700">POST</text>
  <text x="544" y="111" fill="#6b6b8a" font-size="10">Enviar datos para crear un recurso</text>

  <rect x="464" y="126" width="70" height="22" rx="2" fill="rgba(255,159,67,0.1)" stroke="#ff9f43" stroke-width="1"/>
  <text x="499" y="141" text-anchor="middle" fill="#ff9f43" font-size="11" font-weight="700">PUT</text>
  <text x="544" y="141" fill="#6b6b8a" font-size="10">Actualizar un recurso existente</text>

  <rect x="464" y="156" width="70" height="22" rx="2" fill="rgba(255,107,107,0.1)" stroke="#ff6b6b" stroke-width="1"/>
  <text x="499" y="171" text-anchor="middle" fill="#ff6b6b" font-size="11" font-weight="700">DELETE</text>
  <text x="544" y="171" fill="#6b6b8a" font-size="10">Eliminar un recurso</text>

  <rect x="464" y="186" width="70" height="22" rx="2" fill="rgba(199,125,255,0.1)" stroke="#c77dff" stroke-width="1"/>
  <text x="499" y="201" text-anchor="middle" fill="#c77dff" font-size="11" font-weight="700">PATCH</text>
  <text x="544" y="201" fill="#6b6b8a" font-size="10">Modificación parcial de un recurso</text>

  <rect x="464" y="216" width="70" height="22" rx="2" fill="rgba(107,203,119,0.1)" stroke="#6bcb77" stroke-width="1"/>
  <text x="499" y="231" text-anchor="middle" fill="#6bcb77" font-size="11" font-weight="700">HEAD</text>
  <text x="544" y="231" fill="#6b6b8a" font-size="10">Como GET pero sin cuerpo</text>

  <!-- request/response example -->
  <text x="456" y="282" fill="#6b6b8a" font-size="9" letter-spacing="2">// SOLICITUD Y RESPUESTA REAL</text>
  <rect x="456" y="292" width="255" height="110" rx="2" fill="#0d0d18" stroke="#00ff9f" stroke-width="1"/>
  <rect x="456" y="292" width="3" height="110" fill="#00ff9f"/>
  <text x="468" y="310" fill="#00ff9f" font-size="10" font-weight="700">GET / HTTP/1.1</text>
  <text x="468" y="326" fill="#4d96ff" font-size="10">Host: <tspan fill="#b0b0c8">tryhackme.com</tspan></text>
  <text x="468" y="342" fill="#4d96ff" font-size="10">User-Agent: <tspan fill="#b0b0c8">Firefox/87.0</tspan></text>
  <text x="468" y="358" fill="#4d96ff" font-size="10">Accept: <tspan fill="#b0b0c8">text/html</tspan></text>
  <text x="468" y="374" fill="#3a3a5a" font-size="9">[blank line — fin de solicitud]</text>
  <text x="468" y="392" fill="#6b6b8a" font-size="8">REQUEST →</text>

  <rect x="720" y="292" width="276" height="110" rx="2" fill="#0d0d18" stroke="#4d96ff" stroke-width="1"/>
  <rect x="720" y="292" width="3" height="110" fill="#4d96ff"/>
  <text x="732" y="310" fill="#4d96ff" font-size="10" font-weight="700">HTTP/1.1 <tspan fill="#00ff9f">200 OK</tspan></text>
  <text x="732" y="326" fill="#4d96ff" font-size="10">Content-Type: <tspan fill="#b0b0c8">text/html</tspan></text>
  <text x="732" y="342" fill="#4d96ff" font-size="10">Content-Length: <tspan fill="#b0b0c8">12483</tspan></text>
  <text x="732" y="358" fill="#3a3a5a" font-size="9">[blank line]</text>
  <text x="732" y="374" fill="#b0b0c8" font-size="10">&lt;!DOCTYPE html&gt;&lt;html&gt;...</text>
  <text x="732" y="392" fill="#6b6b8a" font-size="8">← RESPONSE</text>

  <!-- security notes -->
  <text x="456" y="428" fill="#6b6b8a" font-size="9" letter-spacing="2">// VECTORES DE ATAQUE</text>
  <rect x="456" y="438" width="255" height="44" rx="2" fill="#12121a" stroke="#ff6b6b" stroke-width="1"/>
  <rect x="456" y="438" width="4" height="44" fill="#ff6b6b"/>
  <text x="470" y="455" fill="#ff6b6b" font-size="9" font-weight="700">HTTP sin cifrar</text>
  <text x="470" y="469" fill="#6b6b8a" font-size="8">MitM — interceptación de credenciales</text>
  <text x="470" y="479" fill="#3a3a5a" font-size="8">→ siempre usar HTTPS</text>

  <rect x="720" y="438" width="276" height="44" rx="2" fill="#12121a" stroke="#ffd93d" stroke-width="1"/>
  <rect x="720" y="438" width="4" height="44" fill="#ffd93d"/>
  <text x="734" y="455" fill="#ffd93d" font-size="9" font-weight="700">Puertos expuestos</text>
  <text x="734" y="469" fill="#6b6b8a" font-size="8">superficie de ataque — escaneo con nmap</text>
  <text x="734" y="479" fill="#3a3a5a" font-size="8">→ cerrar puertos innecesarios</text>
</svg>
