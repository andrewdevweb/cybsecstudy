<svg viewBox="0 0 700 200" xmlns="http://www.w3.org/2000/svg" font-family="'JetBrains Mono', monospace">
  <rect width="700" height="200" fill="#0a0a0f"/>

  <!-- Registry -->
  <rect x="20" y="16" width="320" height="168" rx="4" fill="#12121a" stroke="#c77dff" stroke-width="1.5"/>
  <rect x="20" y="16" width="320" height="5" fill="#c77dff"/>
  <text x="180" y="38" text-anchor="middle" fill="#c77dff" font-size="11" font-weight="700">REGISTRO DE WINDOWS</text>

  <text x="36" y="58" fill="#c77dff" font-size="9">HKEY_LOCAL_MACHINE\</text>
  <text x="36" y="72" fill="#6b6b8a" font-size="8">  └── SOFTWARE\Microsoft\Windows\CurrentVersion\Run</text>
  <text x="36" y="84" fill="#ff6b6b" font-size="8">       ← persistencia de malware aquí</text>

  <text x="36" y="102" fill="#ffd93d" font-size="9">HKEY_CURRENT_USER\</text>
  <text x="36" y="116" fill="#6b6b8a" font-size="8">  └── SOFTWARE\  ← configuración de apps del usuario</text>

  <text x="36" y="134" fill="#6b6b8a" font-size="9">HKEY_CLASSES_ROOT\</text>
  <text x="36" y="148" fill="#6b6b8a" font-size="8">  └── .exe, .pdf... ← asociaciones de archivos</text>

  <text x="36" y="170" fill="#3a3a5a" font-size="8">herramienta: regedit · análisis: Autoruns (Sysinternals)</text>

  <!-- Security sections -->
  <rect x="360" y="16" width="320" height="168" rx="4" fill="#12121a" stroke="#4d96ff" stroke-width="1.5"/>
  <rect x="360" y="16" width="320" height="5" fill="#4d96ff"/>
  <text x="520" y="38" text-anchor="middle" fill="#4d96ff" font-size="11" font-weight="700">SEGURIDAD DE WINDOWS</text>

  <rect x="374" y="48" width="292" height="22" rx="2" fill="#4d96ff" opacity="0.08" stroke="#4d96ff" stroke-width="0.5"/>
  <text x="520" y="63" text-anchor="middle" fill="#4d96ff" font-size="9">🛡 Defender — antivirus tiempo real</text>

  <rect x="374" y="76" width="292" height="22" rx="2" fill="#4d96ff" opacity="0.08" stroke="#4d96ff" stroke-width="0.5"/>
  <text x="520" y="91" text-anchor="middle" fill="#4d96ff" font-size="9">🔥 Firewall — tráfico entrada/salida</text>

  <rect x="374" y="104" width="292" height="22" rx="2" fill="#4d96ff" opacity="0.08" stroke="#4d96ff" stroke-width="0.5"/>
  <text x="520" y="119" text-anchor="middle" fill="#4d96ff" font-size="9">🌐 SmartScreen — apps y webs no verificadas</text>

  <rect x="374" y="132" width="292" height="22" rx="2" fill="#4d96ff" opacity="0.08" stroke="#4d96ff" stroke-width="0.5"/>
  <text x="520" y="147" text-anchor="middle" fill="#4d96ff" font-size="9">🔒 Secure Boot / TPM — protección hardware</text>

  <text x="520" y="174" text-anchor="middle" fill="#3a3a5a" font-size="8">Event ID 4624 login · 4688 proceso · 7045 servicio</text>
</svg>
