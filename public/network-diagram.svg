<svg viewBox="0 0 700 520" xmlns="http://www.w3.org/2000/svg" font-family="'Space Mono', monospace" style="background:#0a0a0f">

  <!-- Grid background -->
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(0,255,200,0.04)" stroke-width="1"/>
    </pattern>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="700" height="520" fill="url(#grid)"/>

  <!-- Vertical line -->
  <line x1="350" y1="60" x2="350" y2="460" stroke="#1e1e2e" stroke-width="2" stroke-dasharray="6,4"/>

  <!-- INTERNET -->
  <rect x="220" y="20" width="260" height="52" rx="2" fill="#12121a" stroke="#00ffc8" stroke-width="1.5"/>
  <text x="350" y="42" text-anchor="middle" fill="#00ffc8" font-size="11" letter-spacing="3" filter="url(#glow)">INTERNET</text>
  <text x="350" y="60" text-anchor="middle" fill="#6b6b8a" font-size="10">Red pública global</text>

  <!-- Arrow down -->
  <line x1="350" y1="72" x2="350" y2="108" stroke="#1e1e2e" stroke-width="2"/>
  <polygon points="350,112 344,100 356,100" fill="#00ffc8"/>

  <!-- ROUTER -->
  <rect x="200" y="115" width="300" height="68" rx="2" fill="#12121a" stroke="#4d96ff" stroke-width="1.5"/>
  <rect x="200" y="115" width="4" height="68" fill="#4d96ff"/>
  <text x="222" y="140" fill="#4d96ff" font-size="13" font-weight="bold" letter-spacing="1">ROUTER</text>
  <text x="222" y="157" fill="#6b6b8a" font-size="10">Capa 3 — OSI</text>
  <text x="420" y="140" fill="#ff9f43" font-size="10">⟵ Port Forwarding</text>
  <text x="420" y="157" fill="#ff6b6b" font-size="10">⟵ Firewall</text>

  <!-- Arrow down -->
  <line x1="350" y1="183" x2="350" y2="218" stroke="#1e1e2e" stroke-width="2"/>
  <polygon points="350,222 344,210 356,210" fill="#00ffc8"/>

  <!-- SWITCH L3 -->
  <rect x="200" y="225" width="300" height="68" rx="2" fill="#12121a" stroke="#c77dff" stroke-width="1.5"/>
  <rect x="200" y="225" width="4" height="68" fill="#c77dff"/>
  <text x="222" y="250" fill="#c77dff" font-size="13" font-weight="bold" letter-spacing="1">SWITCH  L3</text>
  <text x="222" y="267" fill="#6b6b8a" font-size="10">Capas 2-3 — OSI</text>
  <text x="420" y="250" fill="#ffd93d" font-size="10">⟵ Enrutamiento</text>
  <text x="420" y="267" fill="#ffd93d" font-size="10">⟵ VLANs</text>

  <!-- Arrow down -->
  <line x1="350" y1="293" x2="350" y2="328" stroke="#1e1e2e" stroke-width="2"/>
  <polygon points="350,332 344,320 356,320" fill="#00ffc8"/>

  <!-- SWITCH L2 -->
  <rect x="200" y="335" width="300" height="68" rx="2" fill="#12121a" stroke="#6bcb77" stroke-width="1.5"/>
  <rect x="200" y="335" width="4" height="68" fill="#6bcb77"/>
  <text x="222" y="360" fill="#6bcb77" font-size="13" font-weight="bold" letter-spacing="1">SWITCH  L2</text>
  <text x="222" y="377" fill="#6b6b8a" font-size="10">Capa 2 — OSI</text>
  <text x="420" y="360" fill="#6bcb77" font-size="10">⟵ Reenvío por MAC</text>
  <text x="420" y="377" fill="#6bcb77" font-size="10">⟵ Tramas Ethernet</text>

  <!-- Arrow down -->
  <line x1="350" y1="403" x2="350" y2="438" stroke="#1e1e2e" stroke-width="2"/>
  <polygon points="350,442 344,430 356,430" fill="#00ffc8"/>

  <!-- DEVICES -->
  <rect x="200" y="445" width="300" height="52" rx="2" fill="#12121a" stroke="#ff6b9d" stroke-width="1.5"/>
  <rect x="200" y="445" width="4" height="52" fill="#ff6b9d"/>
  <text x="222" y="467" fill="#ff6b9d" font-size="13" font-weight="bold" letter-spacing="1">DISPOSITIVOS</text>
  <text x="222" y="484" fill="#6b6b8a" font-size="10">PCs, servidores, móviles…</text>

  <!-- VPN badge -->
  <rect x="30" y="225" width="130" height="68" rx="2" fill="#12121a" stroke="#ff9f43" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="95" y="250" text-anchor="middle" fill="#ff9f43" font-size="11" font-weight="bold">VPN</text>
  <text x="95" y="266" text-anchor="middle" fill="#6b6b8a" font-size="9">Túnel cifrado</text>
  <text x="95" y="282" text-anchor="middle" fill="#6b6b8a" font-size="9">PPP / PPTP / IPSec</text>
  <line x1="160" y1="259" x2="200" y2="259" stroke="#ff9f43" stroke-width="1" stroke-dasharray="4,3"/>
  <polygon points="200,259 190,254 190,264" fill="#ff9f43"/>

  <!-- Port Forward badge -->
  <rect x="540" y="115" width="130" height="68" rx="2" fill="#12121a" stroke="#ff9f43" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="605" y="140" text-anchor="middle" fill="#ff9f43" font-size="10" font-weight="bold">PORT FORWARD</text>
  <text x="605" y="156" text-anchor="middle" fill="#6b6b8a" font-size="9">Expone servicios</text>
  <text x="605" y="170" text-anchor="middle" fill="#6b6b8a" font-size="9">internos al exterior</text>
  <line x1="500" y1="149" x2="540" y2="149" stroke="#ff9f43" stroke-width="1" stroke-dasharray="4,3"/>

</svg>
