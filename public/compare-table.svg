<svg viewBox="0 0 760 340" xmlns="http://www.w3.org/2000/svg" font-family="'Space Mono', monospace">

  <!-- Header row -->
  <rect x="0" y="0" width="760" height="36" fill="#12121a"/>
  <line x1="0" y1="36" x2="760" y2="36" stroke="#00ffc8" stroke-width="2"/>

  <text x="12" y="22" fill="#00ffc8" font-size="10" letter-spacing="2" font-weight="700">TECNOLOGÍA</text>
  <text x="160" y="22" fill="#00ffc8" font-size="10" letter-spacing="2" font-weight="700">FUNCIÓN</text>
  <text x="400" y="22" fill="#00ffc8" font-size="10" letter-spacing="2" font-weight="700">CAPA OSI</text>
  <text x="510" y="22" fill="#00ffc8" font-size="10" letter-spacing="2" font-weight="700">CIFRADO</text>
  <text x="590" y="22" fill="#00ffc8" font-size="10" letter-spacing="2" font-weight="700">EJEMPLO</text>

  <!-- Col separators -->
  <line x1="150" y1="0" x2="150" y2="340" stroke="#1e1e2e" stroke-width="1"/>
  <line x1="390" y1="0" x2="390" y2="340" stroke="#1e1e2e" stroke-width="1"/>
  <line x1="500" y1="0" x2="500" y2="340" stroke="#1e1e2e" stroke-width="1"/>
  <line x1="580" y1="0" x2="580" y2="340" stroke="#1e1e2e" stroke-width="1"/>

  <!-- ROW 1: Router -->
  <rect x="0" y="36" width="760" height="42" fill="rgba(77,150,255,0.04)"/>
  <rect x="0" y="36" width="3" height="42" fill="#4d96ff"/>
  <text x="12" y="62" fill="#4d96ff" font-size="12" font-weight="700">Router</text>
  <text x="160" y="62" fill="#b0b0c8" font-size="11">Conecta redes distintas</text>
  <text x="400" y="62" fill="#b0b0c8" font-size="11">Capa 3</text>
  <text x="530" y="62" fill="#ff6b6b" font-size="14" text-anchor="middle">✗</text>
  <text x="590" y="62" fill="#6b6b8a" font-size="11">Tu router doméstico</text>
  <line x1="0" y1="78" x2="760" y2="78" stroke="#1e1e2e" stroke-width="1"/>

  <!-- ROW 2: Switch L2 -->
  <rect x="0" y="78" width="760" height="42" fill="transparent"/>
  <rect x="0" y="78" width="3" height="42" fill="#c77dff"/>
  <text x="12" y="104" fill="#c77dff" font-size="12" font-weight="700">Switch L2</text>
  <text x="160" y="104" fill="#b0b0c8" font-size="11">Conecta dispositivos por MAC</text>
  <text x="400" y="104" fill="#b0b0c8" font-size="11">Capa 2</text>
  <text x="530" y="104" fill="#ff6b6b" font-size="14" text-anchor="middle">✗</text>
  <text x="590" y="104" fill="#6b6b8a" font-size="11">Switch de oficina</text>
  <line x1="0" y1="120" x2="760" y2="120" stroke="#1e1e2e" stroke-width="1"/>

  <!-- ROW 3: Switch L3 -->
  <rect x="0" y="120" width="760" height="42" fill="rgba(107,203,119,0.04)"/>
  <rect x="0" y="120" width="3" height="42" fill="#6bcb77"/>
  <text x="12" y="146" fill="#6bcb77" font-size="12" font-weight="700">Switch L3</text>
  <text x="160" y="146" fill="#b0b0c8" font-size="11">Enruta + reenvía tramas</text>
  <text x="400" y="146" fill="#b0b0c8" font-size="11">Capas 2-3</text>
  <text x="530" y="146" fill="#ff6b6b" font-size="14" text-anchor="middle">✗</text>
  <text x="590" y="146" fill="#6b6b8a" font-size="11">Switch empresarial</text>
  <line x1="0" y1="162" x2="760" y2="162" stroke="#1e1e2e" stroke-width="1"/>

  <!-- ROW 4: Firewall -->
  <rect x="0" y="162" width="760" height="42" fill="transparent"/>
  <rect x="0" y="162" width="3" height="42" fill="#ff9f43"/>
  <text x="12" y="188" fill="#ff9f43" font-size="12" font-weight="700">Firewall</text>
  <text x="160" y="188" fill="#b0b0c8" font-size="11">Filtra tráfico entrante/saliente</text>
  <text x="400" y="188" fill="#b0b0c8" font-size="11">Múltiples</text>
  <text x="530" y="188" fill="#ffd93d" font-size="14" text-anchor="middle">~</text>
  <text x="590" y="188" fill="#6b6b8a" font-size="11">pfSense, Snort</text>
  <line x1="0" y1="204" x2="760" y2="204" stroke="#1e1e2e" stroke-width="1"/>

  <!-- ROW 5: VPN -->
  <rect x="0" y="204" width="760" height="42" fill="rgba(0,255,200,0.04)"/>
  <rect x="0" y="204" width="3" height="42" fill="#00ffc8"/>
  <text x="12" y="230" fill="#00ffc8" font-size="12" font-weight="700">VPN</text>
  <text x="160" y="230" fill="#b0b0c8" font-size="11">Túnel cifrado entre redes</text>
  <text x="400" y="230" fill="#b0b0c8" font-size="11">Múltiples</text>
  <text x="530" y="230" fill="#6bcb77" font-size="14" text-anchor="middle">✓</text>
  <text x="590" y="230" fill="#6b6b8a" font-size="11">IPSec, PPTP</text>
  <line x1="0" y1="246" x2="760" y2="246" stroke="#1e1e2e" stroke-width="1"/>

  <!-- ROW 6: Port Forwarding -->
  <rect x="0" y="246" width="760" height="42" fill="transparent"/>
  <rect x="0" y="246" width="3" height="42" fill="#ff6b9d"/>
  <text x="12" y="272" fill="#ff6b9d" font-size="12" font-weight="700">Port Forwarding</text>
  <text x="160" y="272" fill="#b0b0c8" font-size="11">Expone servicios internos</text>
  <text x="400" y="272" fill="#b0b0c8" font-size="11">Capa 3-4</text>
  <text x="530" y="272" fill="#ff6b6b" font-size="14" text-anchor="middle">✗</text>
  <text x="590" y="272" fill="#6b6b8a" font-size="11">Servidor web en :80</text>
  <line x1="0" y1="288" x2="760" y2="288" stroke="#1e1e2e" stroke-width="1"/>

  <!-- ROW 7: VLAN -->
  <rect x="0" y="288" width="760" height="42" fill="rgba(255,211,61,0.04)"/>
  <rect x="0" y="288" width="3" height="42" fill="#ffd93d"/>
  <text x="12" y="314" fill="#ffd93d" font-size="12" font-weight="700">VLAN</text>
  <text x="160" y="314" fill="#b0b0c8" font-size="11">Segmenta red virtual</text>
  <text x="400" y="314" fill="#b0b0c8" font-size="11">Capa 2</text>
  <text x="530" y="314" fill="#ff6b6b" font-size="14" text-anchor="middle">✗</text>
  <text x="590" y="314" fill="#6b6b8a" font-size="11">Ventas vs Contabilidad</text>

  <!-- Border -->
  <rect x="0" y="0" width="760" height="340" fill="none" stroke="#1e1e2e" stroke-width="1"/>
</svg>
