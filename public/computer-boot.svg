<svg viewBox="0 0 700 160" xmlns="http://www.w3.org/2000/svg" font-family="'JetBrains Mono', monospace">
  <rect width="700" height="160" fill="#0a0a0f"/>
  <defs>
    <marker id="ga" markerWidth="7" markerHeight="7" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L7,3 z" fill="#00ff9f"/>
    </marker>
  </defs>

  <!-- Step boxes -->
  <!-- 1 -->
  <rect x="10" y="30" width="110" height="64" rx="3" fill="#12121a" stroke="#00ff9f" stroke-width="1.5"/>
  <rect x="10" y="30" width="110" height="4" fill="#00ff9f"/>
  <rect x="20" y="38" width="20" height="20" rx="3" fill="#00ff9f"/>
  <text x="30" y="53" text-anchor="middle" fill="#000" font-size="11" font-weight="700">1</text>
  <text x="65" y="52" text-anchor="middle" fill="#00ff9f" font-size="10" font-weight="700">Botón</text>
  <text x="65" y="65" text-anchor="middle" fill="#6b6b8a" font-size="9">encendido</text>
  <text x="65" y="78" text-anchor="middle" fill="#6b6b8a" font-size="8">PSU activa</text>
  <text x="65" y="106" text-anchor="middle" fill="#3a3a5a" font-size="8">energía</text>

  <line x1="122" y1="62" x2="138" y2="62" stroke="#00ff9f" stroke-width="1.5" marker-end="url(#ga)"/>

  <!-- 2 -->
  <rect x="140" y="30" width="110" height="64" rx="3" fill="#12121a" stroke="#4d96ff" stroke-width="1.5"/>
  <rect x="140" y="30" width="110" height="4" fill="#4d96ff"/>
  <rect x="150" y="38" width="20" height="20" rx="3" fill="#4d96ff"/>
  <text x="160" y="53" text-anchor="middle" fill="#000" font-size="11" font-weight="700">2</text>
  <text x="195" y="52" text-anchor="middle" fill="#4d96ff" font-size="10" font-weight="700">UEFI/BIOS</text>
  <text x="195" y="65" text-anchor="middle" fill="#6b6b8a" font-size="9">firmware</text>
  <text x="195" y="78" text-anchor="middle" fill="#6b6b8a" font-size="8">inicia hardware</text>
  <text x="195" y="106" text-anchor="middle" fill="#ff6b6b" font-size="8">← bootkit</text>

  <line x1="252" y1="62" x2="268" y2="62" stroke="#00ff9f" stroke-width="1.5" marker-end="url(#ga)"/>

  <!-- 3 -->
  <rect x="270" y="30" width="110" height="64" rx="3" fill="#12121a" stroke="#ff9f43" stroke-width="1.5"/>
  <rect x="270" y="30" width="110" height="4" fill="#ff9f43"/>
  <rect x="280" y="38" width="20" height="20" rx="3" fill="#ff9f43"/>
  <text x="290" y="53" text-anchor="middle" fill="#000" font-size="11" font-weight="700">3</text>
  <text x="325" y="52" text-anchor="middle" fill="#ff9f43" font-size="10" font-weight="700">POST</text>
  <text x="325" y="65" text-anchor="middle" fill="#6b6b8a" font-size="9">autodiagnóstico</text>
  <text x="325" y="78" text-anchor="middle" fill="#6b6b8a" font-size="8">RAM·CPU·disco</text>
  <text x="325" y="106" text-anchor="middle" fill="#3a3a5a" font-size="8">verificación</text>

  <line x1="382" y1="62" x2="398" y2="62" stroke="#00ff9f" stroke-width="1.5" marker-end="url(#ga)"/>

  <!-- 4 -->
  <rect x="400" y="30" width="130" height="64" rx="3" fill="#12121a" stroke="#ffd93d" stroke-width="1.5"/>
  <rect x="400" y="30" width="130" height="4" fill="#ffd93d"/>
  <rect x="410" y="38" width="20" height="20" rx="3" fill="#ffd93d"/>
  <text x="420" y="53" text-anchor="middle" fill="#000" font-size="11" font-weight="700">4</text>
  <text x="465" y="52" text-anchor="middle" fill="#ffd93d" font-size="10" font-weight="700">Boot Device</text>
  <text x="465" y="65" text-anchor="middle" fill="#6b6b8a" font-size="9">selección SSD/USB</text>
  <text x="465" y="78" text-anchor="middle" fill="#6b6b8a" font-size="8">lista de prioridad</text>
  <text x="465" y="106" text-anchor="middle" fill="#ff6b6b" font-size="8">← USB malicioso</text>

  <line x1="532" y1="62" x2="548" y2="62" stroke="#00ff9f" stroke-width="1.5" marker-end="url(#ga)"/>

  <!-- 5 -->
  <rect x="550" y="30" width="140" height="64" rx="3" fill="#12121a" stroke="#c77dff" stroke-width="1.5"/>
  <rect x="550" y="30" width="140" height="4" fill="#c77dff"/>
  <rect x="560" y="38" width="20" height="20" rx="3" fill="#c77dff"/>
  <text x="570" y="53" text-anchor="middle" fill="#000" font-size="11" font-weight="700">5</text>
  <text x="620" y="52" text-anchor="middle" fill="#c77dff" font-size="10" font-weight="700">Bootloader</text>
  <text x="620" y="65" text-anchor="middle" fill="#6b6b8a" font-size="9">carga SO en RAM</text>
  <text x="620" y="78" text-anchor="middle" fill="#6b6b8a" font-size="8">UEFI cede control</text>
  <text x="620" y="106" text-anchor="middle" fill="#00ff9f" font-size="8">SO operativo ✓</text>

  <!-- label bottom -->
  <text x="350" y="148" text-anchor="middle" fill="#3a3a5a" font-size="8" letter-spacing="1">rojo = vector de ataque · verde = operación normal</text>
</svg>
