  <text x="36" y="188" fill="#3a3a5a" font-size="8">⚠ Más complejo de configurar</text>

  <!-- Type 2 -->
  <rect x="380" y="20" width="300" height="180" rx="3" fill="#12121a" stroke="#4d96ff" stroke-width="1.5"/>
  <rect x="380" y="20" width="300" height="5" fill="#4d96ff"/>
  <text x="530" y="44" text-anchor="middle" fill="#4d96ff" font-size="12" font-weight="700">TIPO 2 — Hosted</text>

  <!-- stack visual -->
  <rect x="396" y="54" width="268" height="20" rx="2" fill="#ff9f43" opacity="0.15" stroke="#ff9f43" stroke-width="0.8"/>
  <text x="530" y="68" text-anchor="middle" fill="#ff9f43" font-size="9">Hardware físico</text>
  <rect x="396" y="78" width="268" height="20" rx="2" fill="#6bcb77" opacity="0.1" stroke="#6bcb77" stroke-width="0.8"/>
  <text x="530" y="92" text-anchor="middle" fill="#6bcb77" font-size="9">Sistema Operativo anfitrión</text>
  <rect x="396" y="102" width="268" height="20" rx="2" fill="#4d96ff" opacity="0.2" stroke="#4d96ff" stroke-width="0.8"/>
