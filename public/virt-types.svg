<svg viewBox="0 0 700 220" xmlns="http://www.w3.org/2000/svg" font-family="'JetBrains Mono', monospace">
  <rect width="700" height="220" fill="#0a0a0f"/>

  <!-- Type 1 -->
  <rect x="20" y="20" width="300" height="180" rx="3" fill="#12121a" stroke="#c77dff" stroke-width="1.5"/>
  <rect x="20" y="20" width="300" height="5" fill="#c77dff"/>
  <text x="170" y="44" text-anchor="middle" fill="#c77dff" font-size="12" font-weight="700">TIPO 1 — Bare Metal</text>

