  <rect x="483" y="126" width="82" height="16" rx="2" fill="#4d96ff" opacity="0.1" stroke="#4d96ff" stroke-width="0.8"/>
  <text x="524" y="138" text-anchor="middle" fill="#4d96ff" font-size="8">VM 2</text>

  <text x="396" y="160" fill="#6b6b8a" font-size="8">✓ VirtualBox · VMware Workstation</text>
