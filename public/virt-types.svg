  <rect x="36" y="78" width="268" height="20" rx="2" fill="#c77dff" opacity="0.2" stroke="#c77dff" stroke-width="0.8"/>
  <text x="170" y="92" text-anchor="middle" fill="#c77dff" font-size="9">Hipervisor Tipo 1 (directo)</text>
  <rect x="36"  y="102" width="82" height="20" rx="2" fill="#4d96ff" opacity="0.1" stroke="#4d96ff" stroke-width="0.8"/>
