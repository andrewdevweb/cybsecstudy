  <rect x="123" y="102" width="82" height="20" rx="2" fill="#4d96ff" opacity="0.1" stroke="#4d96ff" stroke-width="0.8"/>
  <text x="164" y="116" text-anchor="middle" fill="#4d96ff" font-size="8">VM 2</text>
  <rect x="210" y="102" width="94" height="20" rx="2" fill="#4d96ff" opacity="0.1" stroke="#4d96ff" stroke-width="0.8"/>
  <text x="257" y="116" text-anchor="middle" fill="#4d96ff" font-size="8">VM 3</text>

  <text x="36" y="146" fill="#6b6b8a" font-size="8">✓ VMware ESXi · Microsoft Hyper-V · KVM</text>
