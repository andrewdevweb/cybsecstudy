<svg viewBox="0 0 760 515" xmlns="http://www.w3.org/2000/svg" font-family="'JetBrains Mono', monospace">
  <rect width="760" height="515" fill="#0a0a0f"/>

  <!-- ── CPU ── -->
  <rect x="20" y="20" width="160" height="180" rx="4" fill="#12121a" stroke="#00ff9f" stroke-width="1.5"/>
  <rect x="20" y="20" width="160" height="5" fill="#00ff9f"/>
  <!-- die -->
  <rect x="50" y="38" width="100" height="80" rx="3" fill="#0a0a0f" stroke="#00ff9f" stroke-width="1"/>
  <rect x="58" y="46" width="38" height="26" rx="2" fill="#00ff9f" opacity="0.15"/>
  <rect x="102" y="46" width="38" height="26" rx="2" fill="#00ff9f" opacity="0.1"/>
  <rect x="58" y="78" width="82" height="24" rx="2" fill="#00ff9f" opacity="0.07"/>
  <!-- pins -->
  <line x1="30" y1="130" x2="20" y2="130" stroke="#00ff9f" stroke-width="1" opacity="0.4"/>
  <line x1="30" y1="140" x2="20" y2="140" stroke="#00ff9f" stroke-width="1" opacity="0.4"/>
  <line x1="170" y1="130" x2="180" y2="130" stroke="#00ff9f" stroke-width="1" opacity="0.4"/>
  <line x1="170" y1="140" x2="180" y2="140" stroke="#00ff9f" stroke-width="1" opacity="0.4"/>
  <!-- labels -->
  <text x="100" y="140" text-anchor="middle" fill="#00ff9f" font-size="14" font-weight="700">CPU</text>
  <text x="100" y="158" text-anchor="middle" fill="#e8eaf0" font-size="11">El Cerebro</text>
  <text x="100" y="174" text-anchor="middle" fill="#6b6b8a" font-size="10">ejecuta instrucciones</text>
  <text x="100" y="192" text-anchor="middle" fill="#3a3a5a" font-size="9">Spectre / Meltdown</text>

  <!-- ── RAM ── -->
  <rect x="200" y="20" width="160" height="180" rx="4" fill="#12121a" stroke="#4d96ff" stroke-width="1.5"/>
  <rect x="200" y="20" width="160" height="5" fill="#4d96ff"/>
  <!-- RAM stick -->
  <rect x="215" y="38" width="130" height="60" rx="2" fill="#0a0a0f" stroke="#4d96ff" stroke-width="1"/>
  <rect x="222" y="46" width="16" height="36" rx="1" fill="#4d96ff" opacity="0.2"/>
  <rect x="243" y="46" width="16" height="36" rx="1" fill="#4d96ff" opacity="0.2"/>
  <rect x="264" y="46" width="16" height="36" rx="1" fill="#4d96ff" opacity="0.2"/>
  <rect x="285" y="46" width="16" height="36" rx="1" fill="#4d96ff" opacity="0.2"/>
  <rect x="306" y="46" width="16" height="36" rx="1" fill="#4d96ff" opacity="0.2"/>
  <!-- labels -->
  <text x="280" y="122" text-anchor="middle" fill="#4d96ff" font-size="14" font-weight="700">RAM</text>
  <text x="280" y="140" text-anchor="middle" fill="#e8eaf0" font-size="11">Memoria Volátil</text>
  <text x="280" y="158" text-anchor="middle" fill="#6b6b8a" font-size="10">corto plazo · GB</text>
  <text x="280" y="174" text-anchor="middle" fill="#6b6b8a" font-size="9">desaparece al apagar</text>
  <text x="280" y="192" text-anchor="middle" fill="#3a3a5a" font-size="9">forensics · cold boot</text>

  <!-- ── SSD/HDD ── -->
  <rect x="380" y="20" width="160" height="180" rx="4" fill="#12121a" stroke="#ffd93d" stroke-width="1.5"/>
  <rect x="380" y="20" width="160" height="5" fill="#ffd93d"/>
  <!-- SSD shape -->
  <rect x="395" y="38" width="130" height="60" rx="2" fill="#0a0a0f" stroke="#ffd93d" stroke-width="1"/>
  <rect x="403" y="50" width="42" height="20" rx="2" fill="#ffd93d" opacity="0.15"/>
  <rect x="452" y="50" width="42" height="20" rx="2" fill="#ffd93d" opacity="0.1"/>
  <rect x="403" y="76" width="110" height="10" rx="1" fill="#ffd93d" opacity="0.06"/>
  <!-- labels -->
  <text x="460" y="122" text-anchor="middle" fill="#ffd93d" font-size="13" font-weight="700">SSD / HDD</text>
  <text x="460" y="140" text-anchor="middle" fill="#e8eaf0" font-size="11">Almacenamiento</text>
  <text x="460" y="158" text-anchor="middle" fill="#6b6b8a" font-size="10">persistente · TB</text>
  <text x="460" y="174" text-anchor="middle" fill="#6b6b8a" font-size="9">malware en disco</text>
  <text x="460" y="192" text-anchor="middle" fill="#3a3a5a" font-size="9">análisis forense</text>

  <!-- ── GPU ── -->
  <rect x="560" y="20" width="180" height="180" rx="4" fill="#12121a" stroke="#c77dff" stroke-width="1.5"/>
  <rect x="560" y="20" width="180" height="5" fill="#c77dff"/>
  <!-- GPU with fans -->
  <rect x="572" y="38" width="156" height="70" rx="2" fill="#0a0a0f" stroke="#c77dff" stroke-width="1"/>
  <circle cx="614" cy="73" r="22" fill="none" stroke="#c77dff" stroke-width="1" opacity="0.3"/>
  <circle cx="614" cy="73" r="9"  fill="#c77dff" opacity="0.1"/>
  <circle cx="686" cy="73" r="22" fill="none" stroke="#c77dff" stroke-width="1" opacity="0.3"/>
  <circle cx="686" cy="73" r="9"  fill="#c77dff" opacity="0.1"/>
  <!-- labels -->
  <text x="650" y="132" text-anchor="middle" fill="#c77dff" font-size="14" font-weight="700">GPU</text>
  <text x="650" y="150" text-anchor="middle" fill="#e8eaf0" font-size="11">Córtex Visual</text>
  <text x="650" y="168" text-anchor="middle" fill="#6b6b8a" font-size="10">cálculo paralelo masivo</text>
  <text x="650" y="184" text-anchor="middle" fill="#6b6b8a" font-size="9">miles de núcleos</text>
  <text x="650" y="198" text-anchor="middle" fill="#3a3a5a" font-size="9">hashcat · cracking</text>

  <!-- dashed connectors to motherboard -->
  <line x1="100" y1="202" x2="100" y2="392" stroke="#00ff9f" stroke-width="1" stroke-dasharray="4,3" opacity="0.3"/>
  <line x1="280" y1="202" x2="280" y2="392" stroke="#4d96ff" stroke-width="1" stroke-dasharray="4,3" opacity="0.3"/>
  <line x1="460" y1="202" x2="460" y2="392" stroke="#ffd93d" stroke-width="1" stroke-dasharray="4,3" opacity="0.3"/>
  <line x1="650" y1="202" x2="650" y2="392" stroke="#c77dff" stroke-width="1" stroke-dasharray="4,3" opacity="0.3"/>

  <!-- ── MOTHERBOARD ── -->
  <rect x="20" y="394" width="720" height="100" rx="4" fill="#12121a" stroke="#ff9f43" stroke-width="1.5"/>
  <rect x="20" y="394" width="720" height="5" fill="#ff9f43"/>

  <!-- slot representations -->
  <rect x="36"  y="408" width="56" height="22" rx="2" fill="#ff9f43" opacity="0.08" stroke="#ff9f43" stroke-width="0.5"/>
  <text x="64"  y="423" text-anchor="middle" fill="#ff9f43" font-size="8" opacity="0.5">DDR</text>
  <rect x="100" y="408" width="56" height="22" rx="2" fill="#ff9f43" opacity="0.08" stroke="#ff9f43" stroke-width="0.5"/>
  <text x="128" y="423" text-anchor="middle" fill="#ff9f43" font-size="8" opacity="0.5">DDR</text>
  <rect x="164" y="408" width="56" height="22" rx="2" fill="#ff9f43" opacity="0.08" stroke="#ff9f43" stroke-width="0.5"/>
  <text x="192" y="423" text-anchor="middle" fill="#ff9f43" font-size="8" opacity="0.5">PCIe</text>
  <rect x="228" y="408" width="56" height="22" rx="2" fill="#ff9f43" opacity="0.08" stroke="#ff9f43" stroke-width="0.5"/>
  <text x="256" y="423" text-anchor="middle" fill="#ff9f43" font-size="8" opacity="0.5">SATA</text>

  <text x="490" y="430" text-anchor="middle" fill="#ff9f43" font-size="14" font-weight="700">PLACA BASE — El Esqueleto y los Nervios</text>
  <text x="490" y="450" text-anchor="middle" fill="#6b6b8a" font-size="11">conecta todos los componentes</text>
  <text x="490" y="468" text-anchor="middle" fill="#3a3a5a" font-size="10">slots PCIe · SATA · DDR · chipset · chip UEFI/BIOS</text>

</svg>
