<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="400" viewBox="0 0 1200 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0f"/>
      <stop offset="100%" style="stop-color:#0d0d1a"/>
    </linearGradient>
    <linearGradient id="green" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00ff9f"/>
      <stop offset="100%" style="stop-color:#00ccff"/>
    </linearGradient>
    <filter id="glow2">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(0,255,200,0.03)" stroke-width="1"/>
    </pattern>
    <radialGradient id="gl" cx="20%" cy="50%" r="40%">
      <stop offset="0%" style="stop-color:rgba(0,255,159,0.06)"/>
      <stop offset="100%" style="stop-color:rgba(0,0,0,0)"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="400" fill="url(#bg)"/>
  <rect width="1200" height="400" fill="url(#grid)"/>
  <rect width="1200" height="400" fill="url(#gl)"/>

  <!-- Terminal window -->
  <rect x="60" y="60" width="500" height="280" rx="6" fill="#0f0f1a" stroke="#1e1e2e" stroke-width="1"/>
  <rect x="60" y="60" width="500" height="32" rx="6" fill="#12121a"/>
  <rect x="60" y="76" width="500" height="16" fill="#12121a"/>
  <circle cx="84" cy="76" r="5" fill="#ff6b6b"/>
  <circle cx="102" cy="76" r="5" fill="#ffd93d"/>
  <circle cx="120" cy="76" r="5" fill="#6bcb77"/>
  <text x="290" y="81" font-family="monospace" font-size="11" fill="#2a2a3a" text-anchor="middle">cybsecstudy ~ $</text>

  <text x="84" y="118" font-family="'Courier New', monospace" font-size="12" fill="#6b6b8a">$ whoami</text>
  <text x="84" y="138" font-family="'Courier New', monospace" font-size="12" fill="#00ff9f" filter="url(#glow2)">CybSecStudy</text>

  <text x="84" y="165" font-family="'Courier New', monospace" font-size="12" fill="#6b6b8a">$ cat about.txt</text>
  <text x="84" y="185" font-family="'Courier New', monospace" font-size="11" fill="#b0b0c8">Máster en Ciberseguridad &amp; IA — Evolve</text>
  <text x="84" y="202" font-family="'Courier New', monospace" font-size="11" fill="#b0b0c8">Aprendiendo en público</text>

  <text x="84" y="229" font-family="'Courier New', monospace" font-size="12" fill="#6b6b8a">$ cat skills.txt</text>
  <text x="84" y="249" font-family="'Courier New', monospace" font-size="11" fill="#4d96ff">[+] Redes y protocolos</text>
  <text x="84" y="266" font-family="'Courier New', monospace" font-size="11" fill="#6bcb77">[+] Blue Team / Defensa</text>
  <text x="84" y="283" font-family="'Courier New', monospace" font-size="11" fill="#ff9f43">[+] Hacking ético</text>
  <text x="84" y="300" font-family="'Courier New', monospace" font-size="11" fill="#c77dff">[+] Ciberseguridad &amp; IA</text>

  <text x="84" y="325" font-family="'Courier New', monospace" font-size="12" fill="#00ff9f" filter="url(#glow2)">█</text>

  <!-- RIGHT -->
  <text x="620" y="130" font-family="Arial Black, sans-serif" font-size="11" fill="#6b6b8a" letter-spacing="4">// SOBRE MÍ</text>
  <text x="616" y="195" font-family="Arial Black, sans-serif" font-size="52" font-weight="900" fill="#e8eaf0" letter-spacing="-2">CybSecStudy</text>
  <line x1="616" y1="212" x2="1140" y2="212" stroke="#1e1e2e" stroke-width="1"/>
  <line x1="616" y1="212" x2="820" y2="212" stroke="url(#green)" stroke-width="1" opacity="0.8"/>

  <text x="616" y="248" font-family="monospace" font-size="11" fill="#6b6b8a" letter-spacing="2">PLATAFORMAS</text>
  <rect x="616" y="260" width="130" height="28" rx="2" fill="none" stroke="#6bcb77" stroke-width="1"/>
  <text x="681" y="279" font-family="monospace" font-size="11" fill="#6bcb77" text-anchor="middle">TryHackMe</text>
  <rect x="756" y="260" width="130" height="28" rx="2" fill="none" stroke="#ff9f43" stroke-width="1"/>
  <text x="821" y="279" font-family="monospace" font-size="11" fill="#ff9f43" text-anchor="middle">HackTheBox</text>

  <text x="616" y="320" font-family="monospace" font-size="11" fill="#6b6b8a" letter-spacing="2">MÁSTER</text>
  <rect x="616" y="332" width="200" height="28" rx="2" fill="rgba(199,125,255,0.08)" stroke="#c77dff" stroke-width="1"/>
  <text x="716" y="351" font-family="monospace" font-size="11" fill="#c77dff" text-anchor="middle">Evolve — Ciberseguridad &amp; IA</text>

  <text x="616" y="393" font-family="monospace" font-size="11" fill="#2a2a3a" letter-spacing="2">cybsecstudy.netlify.app</text>
</svg>
