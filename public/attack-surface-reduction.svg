<svg viewBox="0 0 700 250" xmlns="http://www.w3.org/2000/svg" font-family="'JetBrains Mono', monospace">
  <rect width="700" height="250" fill="#0a0a0f"/>
  <text x="24" y="28" fill="#6b6b8a" font-size="10" letter-spacing="2">// REDUCCION DE SUPERFICIE</text>

  <rect x="40" y="56" width="250" height="146" rx="4" fill="#12121a" stroke="#ff6b6b" stroke-width="1.5"/>
  <text x="165" y="82" text-anchor="middle" fill="#ff6b6b" font-size="11" font-weight="700">ANTES</text>
  <text x="64" y="110" fill="#6b6b8a" font-size="9">• subdominios olvidados</text>
  <text x="64" y="128" fill="#6b6b8a" font-size="9">• cuentas sin revisar</text>
  <text x="64" y="146" fill="#6b6b8a" font-size="9">• puertos abiertos de mas</text>
  <text x="64" y="164" fill="#6b6b8a" font-size="9">• integraciones persistentes</text>

  <path d="M310 129 L390 129" stroke="#3a3a5a" stroke-width="2"/>
  <polygon points="384,124 394,129 384,134" fill="#3a3a5a"/>

  <rect x="410" y="56" width="250" height="146" rx="4" fill="#12121a" stroke="#6bcb77" stroke-width="1.5"/>
  <text x="535" y="82" text-anchor="middle" fill="#6bcb77" font-size="11" font-weight="700">DESPUES</text>
  <text x="434" y="110" fill="#6b6b8a" font-size="9">• activos inventariados</text>
  <text x="434" y="128" fill="#6b6b8a" font-size="9">• MFA y minimo privilegio</text>
  <text x="434" y="146" fill="#6b6b8a" font-size="9">• exposicion innecesaria eliminada</text>
  <text x="434" y="164" fill="#6b6b8a" font-size="9">• menos caminos de abuso</text>

  <text x="350" y="236" text-anchor="middle" fill="#3a3a5a" font-size="8">Reducir superficie suele ser quitar complejidad, no solo añadir tecnologia.</text>
</svg>
