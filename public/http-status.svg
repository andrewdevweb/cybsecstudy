<svg viewBox="0 0 660 180" xmlns="http://www.w3.org/2000/svg" font-family="'JetBrains Mono', monospace">
  <rect width="660" height="180" fill="#0a0a0f"/>

  <!-- 5 range blocks -->
  <!-- 1xx -->
  <rect x="10" y="20" width="116" height="130" rx="2" fill="#12121a" stroke="#6b6b8a" stroke-width="1"/>
  <rect x="10" y="20" width="116" height="3" fill="#6b6b8a"/>
  <text x="68" y="42" text-anchor="middle" fill="#6b6b8a" font-size="18" font-weight="700">1xx</text>
  <text x="68" y="58" text-anchor="middle" fill="#6b6b8a" font-size="8" letter-spacing="1">INFORMATIVO</text>
  <text x="68" y="78" text-anchor="middle" fill="#555" font-size="10">100 Continue</text>
  <text x="68" y="93" text-anchor="middle" fill="#555" font-size="10">101 Switching</text>

  <!-- 2xx -->
  <rect x="134" y="20" width="116" height="130" rx="2" fill="#12121a" stroke="#00ff9f" stroke-width="1"/>
  <rect x="134" y="20" width="116" height="3" fill="#00ff9f"/>
  <text x="192" y="42" text-anchor="middle" fill="#00ff9f" font-size="18" font-weight="700">2xx</text>
  <text x="192" y="58" text-anchor="middle" fill="#00ff9f" font-size="8" letter-spacing="1">ÉXITO</text>
  <text x="192" y="78" text-anchor="middle" fill="#b0b0c8" font-size="10">200 OK</text>
  <text x="192" y="93" text-anchor="middle" fill="#b0b0c8" font-size="10">201 Created</text>
  <text x="192" y="108" text-anchor="middle" fill="#b0b0c8" font-size="10">204 No Content</text>

  <!-- 3xx -->
  <rect x="258" y="20" width="116" height="130" rx="2" fill="#12121a" stroke="#4d96ff" stroke-width="1"/>
  <rect x="258" y="20" width="116" height="3" fill="#4d96ff"/>
  <text x="316" y="42" text-anchor="middle" fill="#4d96ff" font-size="18" font-weight="700">3xx</text>
  <text x="316" y="58" text-anchor="middle" fill="#4d96ff" font-size="8" letter-spacing="1">REDIRECCIÓN</text>
  <text x="316" y="78" text-anchor="middle" fill="#b0b0c8" font-size="10">301 Moved Perm.</text>
  <text x="316" y="93" text-anchor="middle" fill="#b0b0c8" font-size="10">302 Found</text>
  <text x="316" y="108" text-anchor="middle" fill="#b0b0c8" font-size="10">304 Not Modified</text>

  <!-- 4xx -->
  <rect x="382" y="20" width="126" height="130" rx="2" fill="#12121a" stroke="#ffd93d" stroke-width="1"/>
  <rect x="382" y="20" width="126" height="3" fill="#ffd93d"/>
  <text x="445" y="42" text-anchor="middle" fill="#ffd93d" font-size="18" font-weight="700">4xx</text>
  <text x="445" y="58" text-anchor="middle" fill="#ffd93d" font-size="8" letter-spacing="1">ERROR CLIENTE</text>
  <text x="445" y="78" text-anchor="middle" fill="#b0b0c8" font-size="10">400 Bad Request</text>
  <text x="445" y="93" text-anchor="middle" fill="#b0b0c8" font-size="10">401 Unauthorized</text>
  <text x="445" y="108" text-anchor="middle" fill="#b0b0c8" font-size="10">403 Forbidden</text>
  <text x="445" y="123" text-anchor="middle" fill="#b0b0c8" font-size="10">404 Not Found</text>

  <!-- 5xx -->
  <rect x="516" y="20" width="134" height="130" rx="2" fill="#12121a" stroke="#ff6b6b" stroke-width="1"/>
  <rect x="516" y="20" width="134" height="3" fill="#ff6b6b"/>
  <text x="583" y="42" text-anchor="middle" fill="#ff6b6b" font-size="18" font-weight="700">5xx</text>
  <text x="583" y="58" text-anchor="middle" fill="#ff6b6b" font-size="8" letter-spacing="1">ERROR SERVIDOR</text>
  <text x="583" y="78" text-anchor="middle" fill="#b0b0c8" font-size="10">500 Internal Error</text>
  <text x="583" y="93" text-anchor="middle" fill="#b0b0c8" font-size="10">502 Bad Gateway</text>
  <text x="583" y="108" text-anchor="middle" fill="#b0b0c8" font-size="10">503 Unavailable</text>
</svg>
